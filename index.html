<script type="module">
import * as THREE from 'three';
window.__swooper = {};
try {
const VERSION = '0.69';

/* =====================================================================
   OWN FLIGHT PHYSICS — real glider aerodynamics (no scripted limits).
   gravity + lift QA·V²·Cl(α)⟂airflow + drag QA·V²·Cd(α)∥-airflow.
   Speed cap = terminal velocity. Stall = Cl collapse past critical AoA.
   Loops/rolls = control torque vs aerodynamic weathervane stability.
   v0.20: wind 35 + gusts; pitch +50% sharper; LONG TAIL (×2 yaw
   inertia/damping -> nose drops slower in knife-edge); mountains +
   endless descent; glider-shaped craft; stripped dev menu.
   ===================================================================== */
const FIXED = 0.02;
const MASS = 1.0, G = 20.0;
// QA = ½·ρ·A lumped (force = QA·V²·C). Raised 0.0014->0.0034 = a bigger / more
// efficient wing (lower wing loading) -> min loop radius ∝ m/(QA·Cl_max) drops
// -> tight, completable loops. Side effect: more drag -> ~20% slower flight.
const QA = 0.0034;

// lift curve Cl(α)
const CL_SLOPE = 6.5, CL_FP = 0.70;
// higher critical AoA = more stall margin so a hard pull stays attached (max-G)
// -> loops complete instead of mushing. stall now a low-speed phenomenon.
const ALPHA_STALL = 0.36, ALPHA_BLEND = 0.045, ALPHA_TRIM = 0.045;
// drag curve Cd(α). Energy rework (v0.26): low parasitic CD0 -> high top speed
// (dives really accelerate) + floaty efficient glide; low induced CD_IND
// (high-aspect wing) -> pulling/looping/turning keeps speed. Loops still tight.
const CD0 = 0.022, CD_IND = 0.022, CD_STALL = 1.20;   // slipperier still (0.045->0.030->0.022): raises terminal speed ~119->~140 m/s
// lateral
const CY_BETA = 2.0;

// rotational inertia (body axes). roll easy, pitch/yaw heavier.
// NOTE: the "long tail" yaw-inertia experiment (×2) was headless A/B-tested
// vs v0.10 and did NOT slow the knife-edge nose-drop — because in knife-edge
// α≈β≈0 (the craft already tracks its velocity vector); the nose drops only
// because the velocity itself curves down (gravity, no lift). A bigger tail
// tracks the path even tighter -> can't help. Reverted to honest values.
const I_ROLL = 0.80, I_PITCH = 2.00, I_YAW = 2.40;
// control power. STRONG, snappy pitch; PITCH_STAB tuned so a full pull settles
// just below the (now higher) stall AoA -> max-G, clean, loop-capable.
const ROLL_POWER = 7.5;               // gentler roll rate
// asymmetric pitch: nose-up (pull) gentle; nose-down (push) also eased a bit.
const PITCH_POWER_UP = 7.0, PITCH_POWER_DOWN = 6.0;   // gentler nose-down (Up arrow) — eased per feedback
const YAW_CTRL = 4.0;                 // rudder authority (Q/E) — eased 1.5×
// aerodynamic stability (weathervane).
const PITCH_STAB = 36.0, YAW_STAB = 20.0;
const STALL_PITCH = 5.0;             // nose-down pitching moment once stalled
// aerodynamic + base angular damping
const ROLL_DAMP = 2.7, PITCH_DAMP = 8.0, YAW_DAMP = 3.4;
const ROLL_DAMP0 = 0.35, PITCH_DAMP0 = 0.50, YAW_DAMP0 = 0.45;
// control authority reference (dynamic pressure where controls saturate)
const REF_V = 130, QD_REF = QA*REF_V*REF_V, Q_CAP = 2.2;
const MAXW = 7.0, INIT_SPEED = 150, AXIS_RATE = 6.0;

const SPD_LO = 90, SPD_HI = 250;     // camera/HUD speed normalization (world units — internal)
// ONE scale ties all instruments together: 1 world unit = MPS metres. Altitude, vertical speed
// (vario) and airspeed are ALL derived from this, so d(altitude)/dt == vario by construction.
// MPS≈0.27 -> cruise ~40 m/s (~145 km/h), dives ~70-120 m/s; ALT_BASE lifts the readout into a
// realistic high-mountain band (~2200 valleys / ~3200 spawn / ~3900 peaks).
const MPS = 0.27, ALT_BASE = 2500;

// wind: per-seed prevailing breeze (direction+strength set near windBaseAt) + buffeting gusts + sharp squalls
const GUST_AMP = 9.0, SQUALL_AMP = 18.0, GUST_ROLL = 0.5;

const clamp=(v,a,b)=> v<a?a:v>b?b:v;
// persisted settings — one localStorage key each (prefix sw_). Changing the seed never resets these.
function prefB(k,d){ try{ const v=localStorage.getItem('sw_'+k); return v===null?d:v==='1'; }catch(e){ return d; } }
function prefN(k,d){ try{ const v=parseFloat(localStorage.getItem('sw_'+k)); return Number.isFinite(v)?v:d; }catch(e){ return d; } }
function prefSet(k,v){ try{ localStorage.setItem('sw_'+k, v); }catch(e){} }
const invLerp=(a,b,v)=> (v-a)/(b-a);
const WORLD_UP=new THREE.Vector3(0,1,0), WORLD_DOWN=new THREE.Vector3(0,-1,0), ZERO=new THREE.Vector3();
const DEG=180/Math.PI;

/* ===================== SEED & PALETTE (A1 — per-seed sunset look; world reproducible) ===================== */
// seed lives in localStorage (the URL stays clean). A legacy ?seed=N link is still honoured once, then stripped.
const seed = (()=>{
  const sp=new URLSearchParams(location.search), u=parseInt(sp.get('seed'),10);
  let s = Number.isFinite(u) ? (u>>>0) : NaN;
  if(!Number.isFinite(s)){ const ls=prefN('seed',NaN); s = Number.isFinite(ls) ? (ls>>>0) : (Math.floor(Math.random()*1e9)>>>0); }
  prefSet('seed', s);
  if(sp.get('go')==='1'){ try{ sessionStorage.setItem('sw_go','1'); }catch(e){} }    // legacy ?go=1 still auto-starts
  if(location.search){ try{ history.replaceState(null,'',location.pathname); }catch(e){} }   // keep the URL clean
  return s;
})();
const _wr=mulberry32((seed^0x5bd1e995)>>>0); const WORLD_OX=_wr()*900-450, WORLD_OZ=_wr()*900-450;   // each seed = different mountains too
function hsv2rgb(h,s,v){ h=((h%1)+1)%1; const i=Math.floor(h*6),f=h*6-i,p=v*(1-s),q=v*(1-f*s),t=v*(1-(1-f)*s);
  switch(i%6){case 0:return[v,t,p];case 1:return[q,v,p];case 2:return[p,v,t];case 3:return[p,q,v];case 4:return[t,p,v];default:return[v,p,q];} }
function buildPalette(sd){
  const R=mulberry32((Math.imul(sd|0,2654435761)^0x9e3779b9)>>>0); R();R();          // own rng, de-correlated
  const RR=(a,b)=>a+(b-a)*R(), CL=(x,a,b)=>x<a?a:x>b?b:x;
  const blueHour=R()<0.16; let sunHue,sunSat,sunVal;
  if(blueHour){ sunHue=RR(0.58,0.64); sunSat=RR(0.20,0.32); sunVal=RR(0.82,0.92); }     // rare cool blue-hour
  else        { sunHue=RR(-0.02,0.105); sunSat=RR(0.46,0.72); sunVal=RR(0.93,1.0); }     // warm sunset (~84%)
  const glow=hsv2rgb(sunHue,sunSat,sunVal);
  const lift=(c,t,vmin)=>{ let r=c.map(x=>x+(1-x)*t); const v=Math.max(r[0],r[1],r[2]); if(v<vmin&&v>0){const s=vmin/v; r=r.map(x=>Math.min(1,x*s));} return r; };
  const horizonRGB=hsv2rgb(sunHue+0.004, CL(sunSat*0.62,0.10,0.42), RR(0.86,0.95));
  const skyTopRGB=hsv2rgb(RR(blueHour?0.60:0.58, blueHour?0.66:0.64), RR(0.16,0.30), RR(0.72,0.86));
  const skyGroundRGB=hsv2rgb(sunHue, CL(sunSat*0.30,0.06,0.20), RR(0.40,0.52));
  const fogRGB=[0,1,2].map(i=>horizonRGB[i]+(glow[i]-horizonRGB[i])*0.12);
  const hemiSkyRGB=hsv2rgb(RR(0.58,0.64), RR(0.10,0.20), RR(0.85,0.95));
  const hemiGndRGB=hsv2rgb(sunHue, 0.14, RR(0.36,0.44));
  const greenRGB=hsv2rgb(RR(0.17,0.28), RR(0.42,0.60), RR(0.34,0.46));
  const rockRGB=hsv2rgb(RR(0.05,0.10), RR(0.14,0.24), RR(0.38,0.46));
  const snowRGB=hsv2rgb(sunHue, RR(0.05,0.11), RR(0.95,0.99));
  const C=a=>new THREE.Color(a[0],a[1],a[2]);
  return { blueHour, seed:sd,
    sun:C(hsv2rgb(sunHue, sunSat*0.55, Math.min(1,sunVal+0.04))), sunGlow:C(glow),
    haloTint:C(lift(glow,0.45,0.92)), discCore:C(lift(glow,0.55,0.96)),
    horizon:C(horizonRGB), skyTop:C(skyTopRGB), skyGround:C(skyGroundRGB), fog:C(fogRGB),
    hemiSky:C(hemiSkyRGB), hemiGnd:C(hemiGndRGB), rimColor:C(hsv2rgb(sunHue, CL(sunSat*0.9,0.45,0.80), 1.0)),
    green:greenRGB, rock:rockRGB, snow:snowRGB };
}
const PAL=buildPalette(seed);

/* ===================== RENDERER / SCENE ===================== */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight); app.appendChild(renderer.domElement);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const SKY=PAL.skyTop, HORIZON=PAL.horizon;
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(PAL.fog, 0.000068);   // warm aerial-perspective haze
const camera=new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.5, 60000);
scene.add(new THREE.HemisphereLight(PAL.hemiSky, PAL.hemiGnd, 0.55));            // cool dusk sky / warm ground bounce
scene.add(new THREE.AmbientLight(0x2a2230, 0.18));                               // dusky floor — shadows never crush to black
// A2 sunset: LOW warm key light (~18° elevation) -> long raking shadows; follows the craft
const SUN_OFFSET=new THREE.Vector3(-3400,1320,-2200), SUN_DIR=SUN_OFFSET.clone().normalize();
const sun=new THREE.DirectionalLight(PAL.sun,2.05); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.bias=-0.0005; sun.shadow.normalBias=14;
{ const c=sun.shadow.camera; c.near=200; c.far=14000; c.left=-4200; c.right=4200; c.top=4200; c.bottom=-4200; c.updateProjectionMatrix(); }
scene.add(sun); scene.add(sun.target);
// GRAPHICS QUALITY (perf): 0 low / 1 med / 2 high — pixel ratio + shadows + shadow-map size. Live + persisted.
const GFX=[ {pr:0.7, shadows:false, ss:1024}, {pr:1.0, shadows:true, ss:1024}, {pr:1.5, shadows:true, ss:2048} ];
let gfxQ=(()=>{ const v=prefN('gfx',2); return (v===0||v===1||v===2)?v:2; })();
function applyGraphics(q){

/* ===================== CRAFT: Classic sailplane with load-driven wing flex =====================
   One glider (Classic). The wings bow up at the root under aerodynamic load (G) with a springy
   settle (bends up eagerly, eases down). Mesh is cosmetic — physics is a point mass, so the flex
   never changes how it flies. */
const CLASSIC={ span:18, chordRoot:1.5, chordTip:0.9, dih:0.05, boomLen:8.2, wingY:0.25, wingZ:-0.6, finH:2.0,
                body:0xeef0f4, wing:0xdfe3ea, acc:0xcf4036, glass:0x243243 };
const flex={ ready:false };
function buildFlexGlider(){
  const p=CLASSIC, g=new THREE.Group();
  const cBody=new THREE.MeshLambertMaterial({color:p.body,flatShading:true}),
        cWing=new THREE.MeshLambertMaterial({color:p.wing,flatShading:true}),
        cAcc =new THREE.MeshLambertMaterial({color:p.acc, flatShading:true}),
        cGlass=new THREE.MeshLambertMaterial({color:p.glass,flatShading:true});
  const th=0.1, half=p.span/2, root=p.chordRoot, tip=p.chordTip, boomLen=p.boomLen;
  const tailZ=1.0+boomLen;
  const nose=new THREE.Mesh(new THREE.ConeGeometry(0.5,2.6,12),cBody); nose.rotation.x=-Math.PI/2; nose.position.z=-3.4; g.add(nose);
  const pod =new THREE.Mesh(new THREE.CylinderGeometry(0.58,0.5,3.6,12),cBody); pod.rotation.x=Math.PI/2; pod.position.z=-0.7; g.add(pod);
  const can =new THREE.Mesh(new THREE.SphereGeometry(0.46,12,9),cGlass); can.scale.set(1,0.82,2.6); can.position.set(0,0.4,-1.7); g.add(can);
  const boom=new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.12,boomLen,10),cBody); boom.rotation.x=Math.PI/2; boom.position.z=1.0+boomLen/2; g.add(boom);
  const fin=new THREE.Mesh(new THREE.BoxGeometry(0.14,p.finH,1.5),cAcc); fin.position.set(0,p.finH/2,tailZ-0.2); g.add(fin);   // T-tail
  const hs =new THREE.Mesh(new THREE.BoxGeometry(3.6,0.12,0.9),cWing); hs.position.set(0,p.finH,tailZ-0.2); g.add(hs);
  // wing half: a single group hinged at the root (x=0); rotation.z bows the whole panel up under load
  function wing(sign){
    const grp=new THREE.Group(), iL=half*0.5, oL=half*0.5;
    grp.add(new THREE.Mesh(new THREE.BoxGeometry(iL,th,root).translate(sign*iL/2,0,0), cWing));
    grp.add(new THREE.Mesh(new THREE.BoxGeometry(oL,th*0.85,(root+tip)/2).translate(sign*(iL+oL/2),0,(root-tip)*0.2), cWing));
    grp.add(new THREE.Mesh(new THREE.BoxGeometry(half,th*1.05,0.18).translate(sign*half/2,0,-root/2+0.1), cAcc));
    // airbrake spoiler plate: lies flush on the wing top, hinges up at its leading edge under Space
    const sp=new THREE.Mesh(new THREE.BoxGeometry(half*0.5,0.05,0.5), cAcc);
    sp.geometry.translate(0,0.025,0.25);                                  // hinge at front edge -> plate lies aft & up
    const piv=new THREE.Group(); piv.position.set(sign*half*0.40, th*0.55, -0.05); piv.add(sp);
    grp.add(piv);
    grp.position.set(sign*0.45,p.wingY,p.wingZ);
    return {grp,piv};
  }
  { const R=wing(1), L=wing(-1); flex.wingR=R.grp; flex.wingL=L.grp; flex.spoilerR=R.piv; flex.spoilerL=L.piv; g.add(R.grp); g.add(L.grp); }
  flex.dih=p.dih; flex.bend=0; flex.bendV=0; flex.ready=true;
  g.traverse(o=>{ if(o.isMesh) o.castShadow=true; });
  return g;
}
craftHolder.add(buildFlexGlider());

// load-driven wing-bow spring: bends UP eagerly (light damping), eases DOWN over-damped; substepped -> stable
const FX={ K:13, ZUP:0.5, ZDN:1.0, BEND_G:0.05, BEND_MIN:-0.07, BEND_MAX:0.18 };
function updateFlex(dt){
  if(!flex.ready) return;
  dt=Math.min(dt,0.05); const N=4, sdt=dt/N;
  const exG=clamp(glider.gload-1,-1.5,4);
  const wantBend=clamp(exG*FX.BEND_G,FX.BEND_MIN,FX.BEND_MAX);
  const zeta=wantBend<flex.bend?FX.ZDN:FX.ZUP;
  for(let s=0;s<N;s++){ const a=FX.K*FX.K*(wantBend-flex.bend)-2*zeta*FX.K*flex.bendV; flex.bendV+=a*sdt; flex.bend+=flex.bendV*sdt; }
  flex.bend=clamp(flex.bend,FX.BEND_MIN-0.03,FX.BEND_MAX+0.06);
  const a=flex.dih+flex.bend;
  flex.wingR.rotation.z= a;     // right tip up
  flex.wingL.rotation.z=-a;     // left tip up
  if(flex.spoilerR){ const sd=-brake*1.15; flex.spoilerR.rotation.x=sd; flex.spoilerL.rotation.x=sd; }   // airbrakes pop up with Space
}

function smoothstep01(a,b,x){ x=clamp((x-a)/(b-a),0,1); return x*x*(3-2*x); }

/* ===================== AIRBRAKES (B2) — Space held = drag + lift dump ===================== */
let brake=0;                                   // 0..1 smoothed spoiler deployment (held Space)
const CD_BRAKE=0.17, BRAKE_LIFT_DUMP=0.5;
// soft "spilled air" vapor streaming aft off the deployed spoilers (feathered sprites, not squares)
const BRK_N=64, brkPos=new Float32Array(BRK_N*3), brkVel=new Float32Array(BRK_N*3), brkLife=new Float32Array(BRK_N);
let brkPoints, brkMat;
{ const cv=document.createElement('canvas'); cv.width=cv.height=64; const g2=cv.getContext('2d');   // soft round sprite
  const grd=g2.createRadialGradient(32,32,0,32,32,32); grd.addColorStop(0,'rgba(255,255,255,0.9)'); grd.addColorStop(0.45,'rgba(255,255,255,0.3)'); grd.addColorStop(1,'rgba(255,255,255,0)');
  g2.fillStyle=grd; g2.fillRect(0,0,64,64); const tex=new THREE.CanvasTexture(cv);
  const rng=mulberry32(303);
  brkPoints={_spawn:i=>{ const s=rng()<0.5?-1:1; brkPos[i*3]=s*(2.4+rng()*5.4); brkPos[i*3+1]=0.45+(rng()-0.5)*0.5; brkPos[i*3+2]=-0.2+rng()*0.6;
    brkVel[i*3]=(rng()-0.5)*1.2; brkVel[i*3+1]=0.6+rng()*1.0; brkVel[i*3+2]=7+rng()*5; brkLife[i]=rng(); }};
  for(let i=0;i<BRK_N;i++) brkPoints._spawn(i);
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position',new THREE.BufferAttribute(brkPos,3));
  brkMat=new THREE.PointsMaterial({ map:tex, color:0xeef5fa, size:3.6, sizeAttenuation:true, transparent:true, opacity:0, depthWrite:false, fog:false });
  const pts=new THREE.Points(geo,brkMat); pts.frustumCulled=false; gliderGroup.add(pts); brkPoints.mesh=pts; brkPoints.geo=geo;
}
function updateBrakeFX(dt){
  dt=Math.min(dt||0.016,0.05);
  brkMat.opacity=0.15*brake;
  if(brake<0.02) return;
  const sp=brkPoints._spawn;
  for(let i=0;i<BRK_N;i++){ const o=i*3;
    brkPos[o]+=brkVel[o]*dt; brkPos[o+1]+=brkVel[o+1]*dt; brkPos[o+2]+=brkVel[o+2]*dt;
    brkLife[i]+=dt*1.3;
    if(brkLife[i]>1 || brkPos[o+2]>11) sp(i);
  }
  brkPoints.geo.attributes.position.needsUpdate=true;
}

/* ===================== WINGTIP VORTEX TRAILS (C3 — ribbon from the tips, toggle) =====================
   Camera-facing ribbon from each wingtip. Profile along the trail: thin & faint where it leaves the
   tip, widening & strengthening downstream, then fading at the far tail. Attaches to the bowing tip. */
let trailsOn=prefB('trails',true);
const TRAIL_N=46, HALF_SPAN=CLASSIC.span/2;
const trW=new Float32Array(TRAIL_N), trA=new Float32Array(TRAIL_N);   // static width/alpha vs position
for(let i=0;i<TRAIL_N;i++){ const u=(TRAIL_N-1-i)/(TRAIL_N-1);        // u: 0 at tip (newest) -> 1 at oldest
  trW[i]=0.02 + 0.42*Math.min(1,u/0.6);                              // much thinner ribbon
  trA[i]=Math.min(1,u/0.16) * (1-smoothstep01(0.72,1.0,u)); }
function makeTrail(){
  const cpos=new Float32Array(TRAIL_N*3), vpos=new Float32Array(TRAIL_N*2*3), valpha=new Float32Array(TRAIL_N*2);
  for(let i=0;i<TRAIL_N;i++){ valpha[i*2]=trA[i]; valpha[i*2+1]=trA[i]; }
  const idx=[]; for(let i=0;i<TRAIL_N-1;i++){ const a=i*2; idx.push(a,a+1,a+2, a+1,a+3,a+2); }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(vpos,3));
  geo.setAttribute('aAlpha',new THREE.BufferAttribute(valpha,1));
  geo.setIndex(idx);
  const mat=new THREE.ShaderMaterial({ transparent:true, depthWrite:false, side:THREE.DoubleSide,
    uniforms:{ uColor:{value:new THREE.Color(0xe6eef5)}, uOpacity:{value:0} },
    vertexShader:`attribute float aAlpha; varying float vA; void main(){ vA=aAlpha; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`uniform vec3 uColor; uniform float uOpacity; varying float vA; void main(){ float a=vA*uOpacity; if(a<0.004) discard; gl_FragColor=vec4(uColor,a); }`});
  const mesh=new THREE.Mesh(geo,mat); mesh.frustumCulled=false; mesh.renderOrder=3; scene.add(mesh);   // above clouds (renderOrder 2) so trails stay visible
  return {cpos,vpos,geo,mat,mesh};
}
const trailR=makeTrail(), trailL=makeTrail();
const _tip=new THREE.Vector3(), _tan=new THREE.Vector3(), _vd=new THREE.Vector3(), _sd=new THREE.Vector3(), _fb=new THREE.Vector3(0,0,1);
function wingTipLocal(sign,out){ const a=flex.dih+(flex.bend||0);          // follow the bowing tip
  return out.set(sign*(0.45+HALF_SPAN*Math.cos(a)), CLASSIC.wingY+HALF_SPAN*Math.sin(a), CLASSIC.wingZ+0.2); }
function rebuildRibbon(tr){
  const c=tr.cpos, v=tr.vpos, N=TRAIL_N, cam=camera.position;
  for(let i=0;i<N;i++){ const o=i*3;
    const p=(i>0?i-1:i)*3, q=(i<N-1?i+1:i)*3;
    _tan.set(c[q]-c[p], c[q+1]-c[p+1], c[q+2]-c[p+2]);
    if(_tan.lengthSq()<1e-8) _tan.copy(_fb); else { _tan.normalize(); _fb.copy(_tan); }
    _vd.set(cam.x-c[o], cam.y-c[o+1], cam.z-c[o+2]);
    _sd.crossVectors(_tan,_vd); if(_sd.lengthSq()<1e-8) _sd.set(1,0,0); else _sd.normalize();
    const w=trW[i], a=i*6;
    v[a]=c[o]+_sd.x*w;   v[a+1]=c[o+1]+_sd.y*w; v[a+2]=c[o+2]+_sd.z*w;
    v[a+3]=c[o]-_sd.x*w; v[a+4]=c[o+1]-_sd.y*w; v[a+5]=c[o+2]-_sd.z*w;
  }
  tr.geo.attributes.position.needsUpdate=true;
}
function seedTrail(tr,sign,rp,rq){ wingTipLocal(sign,_tip).applyQuaternion(rq).add(rp);
  for(let i=0;i<TRAIL_N;i++){ tr.cpos[i*3]=_tip.x; tr.cpos[i*3+1]=_tip.y; tr.cpos[i*3+2]=_tip.z; } rebuildRibbon(tr); }
function updateTrails(rp,rq){
  const op = trailsOn ? clamp((Math.abs(glider.gload)-1.2)*0.55,0,0.9) : 0;   // vortices appear under G (turns/pulls)
  trailR.mat.uniforms.uOpacity.value=op; trailL.mat.uniforms.uOpacity.value=op;
  for(const [tr,sign] of [[trailR,1],[trailL,-1]]){
    wingTipLocal(sign,_tip).applyQuaternion(rq).add(rp);
    tr.cpos.copyWithin(0,3); const n=tr.cpos.length; tr.cpos[n-3]=_tip.x; tr.cpos[n-2]=_tip.y; tr.cpos[n-1]=_tip.z;
    rebuildRibbon(tr);
  }
}

/* ===================== NEAR-MISS FX (C1) + TERRAIN CRASH (G2) ===================== */
let nearMiss=0, fxOn=prefB('fx',true), crashOn=prefB('crash',false);   // crash into terrain OFF by default

function clearanceNow(){                          // min terrain clearance under/around/ahead -> near-miss thrill
  const p=glider.pos; let m=p.y-terrainHeight(p.x,p.z);
  for(let i=0;i<6;i++){ const a=i*1.0472; m=Math.min(m, p.y-terrainHeight(p.x+Math.cos(a)*45, p.z+Math.sin(a)*45)); }
  m=Math.min(m, (p.y+_f.y*70)-terrainHeight(p.x+_f.x*70, p.z+_f.z*70));

}

addEventListener('keydown',e=>{ if(e.target&&e.target.tagName==='INPUT') return;   // typing in seed field: ignore game keys
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
  keys[e.code]=true;

  else if(e.code==='KeyP'){ if(state==='flying') pauseFreeze(); else if(state==='paused') resumeFlight(); }   // P: freeze-pause toggle

const _cv=renderer.domElement;

  _pmx=e.clientX; _pmy=e.clientY; camIdle=0; });
// D3 mobile: floating dual joysticks. LEFT half = glider (roll/pitch), RIGHT half = camera orbit. Auto-shows on touch.
const touch={ active:false, h:0, v:0 }; let tL=null, tR=null;
const TJR=58, tjL=document.getElementById('tj-l'), tjR=document.getElementById('tj-r');
function joyShow(el,x,y){ el.style.left=x+'px'; el.style.top=y+'px'; el.classList.add('on'); }
function joyKnob(el,dx,dy){ el.firstElementChild.style.transform=`translate(${dx}px,${dy}px)`; }
function joyHide(el){ el.classList.remove('on'); el.firstElementChild.style.transform='translate(0,0)'; }
function joyDelta(el,t){ const b=el.getBoundingClientRect(); let dx=t.clientX-(b.left+b.width/2), dy=t.clientY-(b.top+b.height/2);
  const r=Math.hypot(dx,dy); if(r>TJR){ dx*=TJR/r; dy*=TJR/r; } joyKnob(el,dx,dy); return {x:dx/TJR,y:dy/TJR}; }
addEventListener('touchstart',e=>{
  if(state!=='flying'&&state!=='paused') return;                      // let menu/settings buttons get the tap

    else if(t.clientX>=innerWidth/2 && tR===null){ tR=t.identifier; joyShow(tjR,t.clientX,t.clientY); camIdle=0; }

function startFlight(){
  initAudio();
  if(musicOn && music.paused) music.play().catch(()=>{});   // first play needs this user gesture
  glider.pos.set(0, Math.max(terrainHeight(0,0)+1300, 2700), 0);   // airborne over the range
  spawnY=glider.pos.y;                                  // ALT readout = climb/descent from start
  const m=new THREE.Matrix4().lookAt(ZERO, new THREE.Vector3(0,-0.10,-1).normalize(), WORLD_UP);
  glider.q.setFromRotationMatrix(m);
  const f0=new THREE.Vector3(0,0,-1).applyQuaternion(glider.q);
  glider.vel.copy(f0).multiplyScalar(INIT_SPEED);
  glider.angVel.set(0,0,0);
  glider.airspeed=INIT_SPEED; glider.gndspeed=INIT_SPEED; glider.alpha=0; glider.stall=0;
  rawH=rawV=horizontalInput=verticalInput=0;
  prevPos.copy(glider.pos); prevQ.copy(glider.q);
  updateTerrain(); cloudCX=null; updateClouds();
  brake=0; nearMiss=0; camOrbitAz=0; camOrbitEl=0; camIdle=0; dragging=false; camBase.set(NaN,0,0); resetInst();
  seedTrail(trailR,1,glider.pos,glider.q); seedTrail(trailL,-1,glider.pos,glider.q);
  previewMode=false;
  state='flying'; menuEl.classList.add('hidden'); pauseChip.classList.add('hidden'); settingsEl.classList.add('hidden'); crashEl.classList.add('hidden');
}

function resumeFlight(){   // leave pause/settings, keep flying from where we left off (no teleport/reset)
  if(state!=='paused' && state!=='settings') return;
  initAudio();
  last=performance.now(); acc=0;   // avoid one huge catch-up step after the freeze
  state='flying'; pauseChip.classList.add('hidden'); settingsEl.classList.add('hidden');
}

function readInput(){
  let tH, tV, tY;
  if (inputOverride){ tH=inputOverride.h; tV=inputOverride.v; tY=inputOverride.yaw||0; }
  else if (touch.active){ tH=touch.h; tV=touch.v; tY=0; }            // on-screen left joystick
  else {
    tH=((keys.KeyA||keys.ArrowLeft)?1:0)-((keys.KeyD||keys.ArrowRight)?1:0); // left = roll/turn left
    tV=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0);    // down = nose up (default)
    tY=((keys.KeyE)?1:0)-((keys.KeyQ)?1:0);                                  // E = yaw right, Q = yaw left
  }
  const step=AXIS_RATE*FIXED;
  rawH += clamp(tH-rawH,-step,step); rawV += clamp(tV-rawV,-step,step); rawY += clamp(tY-rawY,-step,step);
  horizontalInput = rawH * sens;
  verticalInput   = rawV * sens * (invert?-1:1);
  yawInput        = rawY * sens;
}

/* ===================== PHYSICS (own aerodynamics) ===================== */
const _f=new THREE.Vector3(), _r=new THREE.Vector3(), _u=new THREE.Vector3(),
      _vair=new THREE.Vector3(), _ahat=new THREE.Vector3(), _lift=new THREE.Vector3(), _side=new THREE.Vector3(),
      _wind=new THREE.Vector3(), _F=new THREE.Vector3(), _T=new THREE.Vector3(), _dq=new THREE.Quaternion(), _axis=new THREE.Vector3(),
      _wbStep=new THREE.Vector3();
let lastBeta=0;

function fixedStep(){
  readInput();
  simTime+=FIXED;
  const hIn=clamp(horizontalInput,-1,1), vIn=clamp(verticalInput,-1,1), yIn=clamp(yawInput,-1,1);
  const bt=(inputOverride? (inputOverride.brake?1:0) : (keys.Space?1:0));
  brake += (bt-brake)*0.14;                              // airbrake deploys/retracts over ~0.15s

  _f.set(0,0,-1).applyQuaternion(glider.q);
  _r.set(1,0,0).applyQuaternion(glider.q);
  _u.set(0,1,0).applyQuaternion(glider.q);

  // wind + strong gusts + sharp squalls (feeds aero -> craft really rocks/sways)
  const t=simTime;
  const sq=SQUALL_AMP*Math.pow(Math.max(0,Math.sin(t*0.32+0.5)),6);   // sharp gust front, peaks ~every 20s
  const sqA=t*0.23;
  windSteeredAt(glider.pos.x, glider.pos.z, glider.pos.y, t, _wbStep); // local drift + terrain steering (venturi/lee)
  _wind.set(
    _wbStep.x + GUST_AMP*(Math.sin(t*0.37)+0.6*Math.sin(t*0.91+1.3)) + sq*Math.cos(sqA),
                GUST_AMP*0.5*(Math.sin(t*0.61+0.8)+0.5*Math.sin(t*1.23+2.1)) + sq*0.45*Math.sin(t*0.8),
    _wbStep.z + GUST_AMP*(Math.sin(t*0.43+2.1)+0.6*Math.sin(t*1.07+0.5)) + sq*Math.sin(sqA)
  );
  _wind.y += windLift(glider.pos.x, glider.pos.y, glider.pos.z, t);   // ridge lift + thermals (soaring), capped & stall-safe
  _vair.copy(glider.vel).sub(_wind);
  const V=_vair.length();
  glider.airspeed=V; glider.gndspeed=glider.vel.length();

  _F.set(0,0,0);
  _F.y -= MASS*G;                                       // gravity

  let alpha=0, beta=0, w=0;
  if (V>1e-3){
    _ahat.copy(_vair).multiplyScalar(1/V);
    const vf=_vair.dot(_f), vu=_vair.dot(_u), vr=_vair.dot(_r);
    alpha=Math.atan2(-vu, vf);                          // angle of attack
    beta =Math.atan2( vr, vf);                          // sideslip
    const aa=Math.abs(alpha);
    const clAtt=CL_SLOPE*alpha, clFp=CL_FP*Math.sin(2*alpha);
    w=1/(1+Math.exp(-(aa-ALPHA_STALL)/ALPHA_BLEND));    // 0 attached -> 1 stalled
    const cl=((1-w)*clAtt + w*clFp)*(1-BRAKE_LIFT_DUMP*brake);                            // spoilers dump lift
    const cd=CD0 + CD_IND*cl*cl + w*CD_STALL*Math.sin(aa)*Math.sin(aa) + CD_BRAKE*brake;  // + spoiler drag
    const qd=QA*V*V;
    glider.gload=(qd*cl)/(MASS*G);                       // wing load factor (drives flex)

    _lift.copy(_u).addScaledVector(_ahat, -_u.dot(_ahat));
    if (_lift.lengthSq()>1e-9){ _lift.normalize(); _F.addScaledVector(_lift, qd*cl); }
    _F.addScaledVector(_ahat, -qd*cd);
    _side.copy(_r).addScaledVector(_ahat, -_r.dot(_ahat));
    if (_side.lengthSq()>1e-9){ _side.normalize(); _F.addScaledVector(_side, qd*(-CY_BETA*beta)); }

    // ----- torques (body axes) -----
    const qs=clamp(qd/QD_REF,0,Q_CAP);
    const pRoll=glider.angVel.dot(_f), qPitch=glider.angVel.dot(_r), rYaw=glider.angVel.dot(_u);
    glider.pRoll=pRoll; glider.qPitch=qPitch; glider.rYaw=rYaw;     // body-frame rates -> flex driver
    let tRoll  = -ROLL_POWER*hIn*qs;
    let tPitch =  (vIn>0?PITCH_POWER_UP:PITCH_POWER_DOWN)*vIn*qs;   // gentler pull, fuller push
    let tYaw   = -YAW_CTRL*yIn*qs;                                  // E = yaw right (heading +)
    tPitch += -PITCH_STAB*(alpha-ALPHA_TRIM)*qs;
    tPitch += -STALL_PITCH*w;
    tYaw   += -YAW_STAB*beta*qs;
    tRoll  += -(ROLL_DAMP*qs +ROLL_DAMP0 )*pRoll;
    tPitch += -(PITCH_DAMP*qs+PITCH_DAMP0)*qPitch;
    tYaw   += -(YAW_DAMP*qs  +YAW_DAMP0  )*rYaw;
    // gusts hit the wings unevenly -> visible rolling/pitching buffeting (strong in squalls)
    tRoll  += (GUST_ROLL*(Math.sin(t*1.7+0.3)+0.7*Math.sin(t*0.83+2.0)) + sq*0.018*Math.sin(t*1.1+0.6))*qs;
    tPitch += (0.35*GUST_ROLL*Math.sin(t*1.3+1.1) + sq*0.012*Math.sin(t*0.9))*qs;

    _T.set(0,0,0);
    _T.addScaledVector(_f, tRoll/I_ROLL);
    _T.addScaledVector(_r, tPitch/I_PITCH);
    _T.addScaledVector(_u, tYaw/I_YAW);
    glider.angVel.addScaledVector(_T, FIXED);
  }
  glider.alpha=alpha; glider.stall=w; lastBeta=beta;

  // ----- integrate -----
  glider.vel.addScaledVector(_F, FIXED/MASS);
  glider.pos.addScaledVector(glider.vel, FIXED);
  let wl=glider.angVel.length();
  if (wl>MAXW){ glider.angVel.multiplyScalar(MAXW/wl); wl=MAXW; }
  if (wl>1e-6){ _dq.setFromAxisAngle(_axis.copy(glider.angVel).multiplyScalar(1/wl), wl*FIXED); glider.q.premultiply(_dq); glider.q.normalize(); }

  // terrain collision (G2): crash on contact. Skipped in headless sim (inputOverride set) and when toggled off.
  if(crashOn && !inputOverride && glider.pos.y <= terrainHeight(glider.pos.x,glider.pos.z)+1.5) crash();
}

/* ===================== CAMERA (chase, never inverts) ===================== */
const _camGoal=new THREE.Vector3(), _look=new THREE.Vector3(), _cUp=new THREE.Vector3(), _cu2=new THREE.Vector3(),
      _cf=new THREE.Vector3(), _lr=new THREE.Vector3(), _lu=new THREE.Vector3(), _cp=new THREE.Vector3(), _ml=new THREE.Matrix4(), _cq=new THREE.Quaternion(), _ctmp=new THREE.Vector3(),
      _off=new THREE.Vector3(), _oax=new THREE.Vector3();
const LOOK_AHEAD=42, ROLL_TILT=0.20;     // camera tilts ≤~14° with bank, fades to 0 inverted (smooth thru rolls)
let camDistSmooth=60;                     // speed-based camera distance, eased over time
const camBase=new THREE.Vector3(NaN,0,0); // orbit-free smoothed follow position (re-inits on NaN)
function updateCamera(dt, rpos, rq){
  // mouse-orbit idle auto-return: hold the look for ~1.2s after the last drag, then ease back to chase
  if(dragging||tR!=null) camIdle=0; else { camIdle+=dt; if(camIdle>1.8){ const k=1-Math.exp(-dt*1.6);
    camOrbitAz-=camOrbitAz*k; camOrbitEl-=camOrbitEl*k; if(Math.abs(camOrbitAz)<1e-3)camOrbitAz=0; if(Math.abs(camOrbitEl)<1e-3)camOrbitEl=0; } }
  _cf.set(0,0,-1).applyQuaternion(rq);
  _cu2.set(0,1,0).applyQuaternion(rq);
  // level (no-roll) up in the plane of forward
  _lr.crossVectors(_cf, WORLD_UP);
  if (_lr.lengthSq()<1e-4){ _lr.set(1,0,0).applyQuaternion(rq); _lr.y=0; if(_lr.lengthSq()<1e-6)_lr.set(1,0,0); }
  _lr.normalize(); _lu.crossVectors(_lr,_cf).normalize();
  // craft-up projected ⟂ forward (rotates continuously with roll, no atan2 wrap)
  _cp.copy(_cu2).addScaledVector(_cf, -_cu2.dot(_cf));
  if (_cp.lengthSq()<1e-6) _cp.copy(_lu); else _cp.normalize();
  // limited tilt toward roll that FADES TO ZERO at inversion -> no jerk in barrel rolls
  _cUp.copy(_cp).sub(_lu).multiplyScalar(ROLL_TILT).add(_lu).normalize();
  // speed -> camera distance (100->60, 300->100), eased
  const targetDist=clamp(30+(glider.gndspeed-100)*0.07, 36, 44);   // closer (min 36 so slow flight isn't too tight)
  camDistSmooth += (targetDist-camDistSmooth)*(1-Math.exp(-dt*1.5));
  // 1) camBase = orbit-FREE smoothed follow position. Its goal is always BEHIND the craft, so it never
  //    accumulates orbit -> the rotation below can't compound/spin.
  _camGoal.copy(rpos).addScaledVector(_cf,-camDistSmooth*0.95).addScaledVector(WORLD_UP,camDistSmooth*0.30);
  if(isNaN(camBase.x)) camBase.copy(_camGoal);
  camBase.lerp(_camGoal, 1-Math.exp(-dt*1.6));
  _ctmp.copy(camBase).sub(rpos); const cd=_ctmp.length();          // leash to eased distance (kills lag blowout)
  if (cd>camDistSmooth) camBase.copy(rpos).addScaledVector(_ctmp, camDistSmooth/cd);
  // 2) final camera = camBase rigidly orbited around the craft by the CURRENT az/el -> INSTANT, crisp, no spin
  _off.copy(camBase).sub(rpos);
  if(camOrbitAz!==0||camOrbitEl!==0){ _off.applyAxisAngle(WORLD_UP,camOrbitAz);
    _oax.crossVectors(_off,WORLD_UP); if(_oax.lengthSq()>1e-6){ _oax.normalize(); _off.applyAxisAngle(_oax,camOrbitEl); } }
  camera.position.copy(rpos).add(_off);
  const tY=terrainHeight(camera.position.x,camera.position.z)+22;
  if (camera.position.y<tY) camera.position.y=tY;
  const orbAmt=clamp((Math.abs(camOrbitAz)+Math.abs(camOrbitEl))/0.5,0,1);   // look at the craft itself while orbiting
  _look.copy(rpos).addScaledVector(_cf,LOOK_AHEAD*(1-orbAmt));
  // gimbal guard: if the view direction is nearly (anti)parallel to up (camera orbited overhead), re-orthogonalize
  _ctmp.copy(_look).sub(camera.position);
  if(_ctmp.lengthSq()>1e-9){ _ctmp.normalize(); const dt2=_ctmp.dot(_cUp);
    if(Math.abs(dt2)>0.985){ _cUp.addScaledVector(_ctmp,-dt2); if(_cUp.lengthSq()<1e-6) _cUp.copy(_lu); _cUp.normalize(); } }
  _ml.lookAt(camera.position,_look,_cUp); _cq.setFromRotationMatrix(_ml);
  camera.quaternion.slerp(_cq, 1-Math.exp(-dt*((dragging||orbAmt>0.01)?9.0:2.2)));   // crisp aim while orbiting, smooth otherwise
  const sn=clamp(invLerp(SPD_LO,SPD_HI,glider.gndspeed),0,1);
  const fov=70+sn*16; camera.fov+=(fov-camera.fov)*Math.min(1,dt*4); camera.updateProjectionMatrix();
  document.getElementById('vign').style.opacity=Math.max(0,(sn-0.5))*0.8;   // speed vignette only — near-miss is audio-only
}

const MAP=150, MAPR=MAP/2, MAP_TOP=15, MAP_RANGE=3000, GN=26, PEAK_FLOOR=1.4, PEAK_CEIL=12;   // CEIL: one arcade outlier can't wash the rest grey
const _mdpr=Math.min(window.devicePixelRatio||1, 2);
const mapCv=document.createElement('canvas'); mapCv.width=MAP*_mdpr; mapCv.height=(MAP+MAP_TOP)*_mdpr;

const heatCtx=heatCv.getContext('2d'), heatImg=heatCtx.createImageData(GN,GN), heatVals=new Float32Array(GN*GN);
let heatPeak=PEAK_FLOOR, heatTimer=1;
const _hc=[0,0,0];
function heatColor(v,peak){ const t=clamp(v/peak,-1,1);
  if(t>=0){ _hc[0]=68+168*t; _hc[1]=72-14*t; _hc[2]=80-34*t; }              // grey -> red
  else{ const a=-t; _hc[0]=68-16*a; _hc[1]=72+46*a; _hc[2]=80+146*a; } }    // grey -> blue
function sampleHeat(hr){
  const gx=glider.pos.x, gz=glider.pos.z, gy=glider.pos.y, t=simTime, sh=Math.sin(hr), ch=Math.cos(hr), R=MAP_RANGE; let mx=PEAK_FLOOR*0.7;
  for(let j=0;j<GN;j++)for(let i=0;i<GN;i++){
    const cx=(i/(GN-1)-0.5)*2, cy=(j/(GN-1)-0.5)*2;               // -1..1 (top cy<0 = forward)
    const along=-cy*R, cross=cx*R, wx=gx+sh*along+ch*cross, wz=gz-ch*along+sh*cross;   // heading-up -> world
    const v=windLift(wx,gy,wz,t)*MPS; heatVals[j*GN+i]=v; const av=Math.min(v<0?-v:v, PEAK_CEIL); if(av>mx)mx=av;
  }
  heatPeak += (Math.max(PEAK_FLOOR,mx)-heatPeak)*0.2;             // relative scale, eased (no flicker)
  const d=heatImg.data;
  for(let k=0;k<GN*GN;k++){ heatColor(heatVals[k],heatPeak); const o=k*4; d[o]=_hc[0]; d[o+1]=_hc[1]; d[o+2]=_hc[2]; d[o+3]=255; }
  heatCtx.putImageData(heatImg,0,0);
}

/* ===================== AUDIO (procedural wind + variometer beep) ===================== */
let audioCtx=null, windGain=null, windFilt=null, audioOn=prefB('sound',true);
let varioOn=prefB('vario',false);   // variometer beep OFF by default
let varioOsc=null, varioGain=null, beepPhase=0;
let rumbleFilt=null, rumbleGain=null, howlFilt=null, howlGain=null, buffFilt=null, buffGain=null, buffLFOGain=null;   // E1 sound juice
function initAudio(){
  try{
    if(audioCtx){ audioCtx.resume&&audioCtx.resume(); return; }
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const sr=audioCtx.sampleRate, buf=audioCtx.createBuffer(1, sr*2, sr), d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=audioCtx.createBufferSource(); src.buffer=buf; src.loop=true;
    windFilt=audioCtx.createBiquadFilter(); windFilt.type='lowpass'; windFilt.frequency.value=500; windFilt.Q.value=0.7;
    windGain=audioCtx.createGain(); windGain.gain.value=0;
    src.connect(windFilt); windFilt.connect(windGain); windGain.connect(audioCtx.destination); src.start();
    // variometer tone: rising beeps when climbing, low growl in strong sink
    varioOsc=audioCtx.createOscillator(); varioOsc.type='sine'; varioOsc.frequency.value=600;
    varioGain=audioCtx.createGain(); varioGain.gain.value=0;
    varioOsc.connect(varioGain); varioGain.connect(audioCtx.destination); varioOsc.start();
    // E1 ground rumble — deep low-pass noise that swells near the slope at speed
    rumbleFilt=audioCtx.createBiquadFilter(); rumbleFilt.type='lowpass'; rumbleFilt.frequency.value=110; rumbleFilt.Q.value=0.8;
    rumbleGain=audioCtx.createGain(); rumbleGain.gain.value=0;
    src.connect(rumbleFilt); rumbleFilt.connect(rumbleGain); rumbleGain.connect(audioCtx.destination);
    // E1 canyon howl — resonant band-pass that rises when terrain hems you in on both sides
    howlFilt=audioCtx.createBiquadFilter(); howlFilt.type='bandpass'; howlFilt.frequency.value=560; howlFilt.Q.value=7;
    howlGain=audioCtx.createGain(); howlGain.gain.value=0;
    src.connect(howlFilt); howlFilt.connect(howlGain); howlGain.connect(audioCtx.destination);
    // E1 stall buffet — rough band of noise pulsed by an ~18 Hz LFO when the wing stalls
    buffFilt=audioCtx.createBiquadFilter(); buffFilt.type='bandpass'; buffFilt.frequency.value=190; buffFilt.Q.value=1.1;
    buffGain=audioCtx.createGain(); buffGain.gain.value=0;
    src.connect(buffFilt); buffFilt.connect(buffGain); buffGain.connect(audioCtx.destination);
    const buffLFO=audioCtx.createOscillator(); buffLFO.type='square'; buffLFO.frequency.value=18;
    buffLFOGain=audioCtx.createGain(); buffLFOGain.gain.value=0;
    buffLFO.connect(buffLFOGain); buffLFOGain.connect(buffGain.gain); buffLFO.start();
  }catch(e){}
}
const _encR=new THREE.Vector3();
function canyonEnclosure(){     // 0..1 — both lateral sides rise above the craft AND we're low-ish
  const p=glider.pos, rl=Math.hypot(_f.x,_f.z)||1, ux=-_f.z/rl, uz=_f.x/rl, D=200;
  const hL=terrainHeight(p.x-ux*D,p.z-uz*D)-p.y, hR=terrainHeight(p.x+ux*D,p.z+uz*D)-p.y;
  const agl=p.y-terrainHeight(p.x,p.z);
  return clamp(Math.min(hL,hR)/150,0,1)*clamp(1-agl/600,0,1);
}
function updateAudio(){
  if(!audioCtx||audioCtx.state!=='running'||!windGain) return;
  const sp=glider.airspeed, agl=glider.pos.y-terrainHeight(glider.pos.x,glider.pos.z);
  const sn=clamp((sp-50)/240,0,1), prox=clamp(1-agl/700,0,1), now=audioCtx.currentTime, on=audioOn?1:0;
  windGain.gain.setTargetAtTime(on*(0.03+0.17*sn*sn+0.07*prox+0.16*nearMiss), now, 0.08);   // near-miss whoosh swell
  windFilt.frequency.setTargetAtTime(320+sp*4.2+prox*700+nearMiss*1100, now, 0.08);
  // E1: deep ground rumble near the slope
  rumbleGain.gain.setTargetAtTime(on*0.11*prox*prox*(0.4+0.6*sn), now, 0.1);
  rumbleFilt.frequency.setTargetAtTime(70+sp*0.6, now, 0.1);
  // E1: canyon howl when hemmed in
  const enc=canyonEnclosure();
  howlGain.gain.setTargetAtTime(on*0.06*enc*(0.3+0.7*sn), now, 0.15);
  howlFilt.frequency.setTargetAtTime(430+sp*2.0+enc*280, now, 0.15);
  // E1: stall buffet (LFO depth on the buffet band)
  buffLFOGain.gain.setTargetAtTime(on*clamp((glider.stall-0.35)/0.4,0,1)*0.07, now, 0.05);
}
function updateVarioSound(vario, dt){   // vario in m/s (vel.y*0.1)
  if(!audioCtx||audioCtx.state!=='running'||!varioGain) return;
  const now=audioCtx.currentTime;
  if(!varioOn){ varioGain.gain.setTargetAtTime(0, now, 0.05); return; }   // independent of wind sound
  if(vario>0.15){                       // climbing -> beeps; faster & higher with stronger lift
    const c=Math.min(vario,4);
    varioOsc.frequency.setTargetAtTime(620+c*180, now, 0.02);
    beepPhase += dt*(1.5+c*1.7);  if(beepPhase>=1) beepPhase-=1;
    varioGain.gain.setTargetAtTime(beepPhase<0.5?0.05:0.0, now, 0.008);
  } else if(vario<-1.4){                 // strong sink -> quiet low growl
    varioOsc.frequency.setTargetAtTime(225, now, 0.06);
    varioGain.gain.setTargetAtTime(0.022, now, 0.06); beepPhase=0;
  } else { varioGain.gain.setTargetAtTime(0, now, 0.05); beepPhase=0; }
}
function silenceAudio(){    // on pause: fade everything out so nothing hangs while frozen
  if(!audioCtx||!windGain) return; const now=audioCtx.currentTime;
  windGain.gain.setTargetAtTime(0,now,0.05);
  for(const g of [varioGain,rumbleGain,howlGain,buffLFOGain]) if(g) g.gain.setTargetAtTime(0,now,0.05);
}

let last=performance.now(), acc=0;
const fpsEl=document.getElementById('fps'); let fpsEMA=60, fpsT=0;
const _rp=new THREE.Vector3(), _rq=new THREE.Quaternion();
function loop(now){
  requestAnimationFrame(loop);
  let frame=(now-last)/1000; last=now; if(!(frame>0))frame=0;
  if(frame>0){ fpsEMA+=(1/frame-fpsEMA)*0.12; fpsT+=frame; if(fpsT>=0.25){ fpsT=0; if(fpsEl) fpsEl.textContent=Math.round(fpsEMA)+' FPS'; } }
  frame=Math.min(frame,0.1);
  if (state==='flying'){
    acc+=frame; let guard=0;
    while(acc>=FIXED && guard++<8){ prevPos.copy(glider.pos); prevQ.copy(glider.q); fixedStep(); acc-=FIXED; }
    updateHUD(frame); updateTerrain(); updateClouds();
    const spF=clamp((glider.gndspeed-120)/120,0,1);                       // near-miss only thrills when fast
    const nmT=fxOn? clamp(1-clearanceNow()/90,0,1)*spF : 0;
    nearMiss += (nmT-nearMiss)*Math.min(1,frame*5);
  } else nearMiss*=0.92;
  const alpha = state==='flying' ? clamp(acc/FIXED,0,1) : 1;
  _rp.lerpVectors(prevPos, glider.pos, alpha);
  _rq.copy(prevQ).slerp(glider.q, alpha);
  if(!previewMode){ gliderGroup.position.copy(_rp); gliderGroup.quaternion.copy(_rq);
    updateCamera(frame||FIXED, _rp, _rq); }
  updateFlex(frame||FIXED);
  if(state==='flying') updateTrails(_rp,_rq); else { trailR.mat.uniforms.uOpacity.value=0; trailL.mat.uniforms.uOpacity.value=0; }
  updateBrakeFX(frame||FIXED);
  sky.position.copy(camera.position);
  sun.position.copy(_rp).add(SUN_OFFSET); sun.target.position.copy(_rp); sun.target.updateMatrixWorld();
  sunDisc.position.copy(camera.position).addScaledVector(SUN_DIR,44000);
  updateAirParticles(frame||FIXED);
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// menu backdrop
glider.pos.set(0, Math.max(terrainHeight(0,0)+1300, 2700), 0);
{ const m=new THREE.Matrix4().lookAt(ZERO,new THREE.Vector3(0,-0.10,-1).normalize(),WORLD_UP); glider.q.setFromRotationMatrix(m); }
prevPos.copy(glider.pos); prevQ.copy(glider.q);
_f.set(0,0,-1).applyQuaternion(glider.q);
updateTerrain(); updateClouds();
camera.position.set(0, glider.pos.y+10, 36); camera.lookAt(0, glider.pos.y-6, -40);
requestAnimationFrame(loop);
if((()=>{ try{ return sessionStorage.getItem('sw_go')==='1'; }catch(e){ return false; } })()){ try{ sessionStorage.removeItem('sw_go'); }catch(e){} startFlight(); }   // ⟳ from settings -> skip menu, fly straight in

/* ===================== headless hooks ===================== */
window.__swooper={
  get state(){return state;}, get speed(){return glider.gndspeed;}, get airspeed(){return glider.airspeed;},
  pos(){ return {x:+glider.pos.x.toFixed(1),y:+glider.pos.y.toFixed(1),z:+glider.pos.z.toFixed(1)}; },
  start(){ startFlight(); },
  th(x,z){ return +terrainHeight(x,z).toFixed(0); },
  liftAt(x,y,z){ return +windLift(x,y,z,simTime).toFixed(1); },
  craftLift(){ return +windLift(glider.pos.x,glider.pos.y,glider.pos.z,simTime).toFixed(1); },
  tstr(x,z){ return +thermalStrength(x,z).toFixed(3); },
  windBase(x,z){ const v=windBaseAt(x,z,simTime,new THREE.Vector3()); return {x:+v.x.toFixed(1),z:+v.z.toFixed(1),mag:+Math.hypot(v.x,v.z).toFixed(1),ang:+(Math.atan2(v.x,-v.z)*DEG).toFixed(0)}; },
  cloudCount(){ let n=0; for(let i=0;i<cloudSize.array.length;i++) if(cloudSize.array[i]>0) n++; return n; },
  flexState(){ return {bend:+flex.bend.toFixed(4), wingR:+flex.wingR.rotation.z.toFixed(3), wingL:+flex.wingL.rotation.z.toFixed(3)}; },
  preview(dist=16,az=0.7,el=0.34,g=null){ if(g!=null) glider.gload=g; previewMode=true; gliderGroup.position.set(0,0,0); gliderGroup.quaternion.identity();
    camera.position.set(Math.sin(az)*Math.cos(el)*dist, Math.sin(el)*dist, Math.cos(az)*Math.cos(el)*dist); camera.lookAt(0,0.4,0); },
  varioGainNow(){ return varioGain?+varioGain.gain.value.toFixed(4):-1; },
  palette(){ return {seed, blueHour:PAL.blueHour, sun:'#'+PAL.sun.getHexString(), horizon:'#'+PAL.horizon.getHexString(), skyTop:'#'+PAL.skyTop.getHexString(), fog:'#'+PAL.fog.getHexString(), green:PAL.green.map(x=>+x.toFixed(2)), snow:PAL.snow.map(x=>+x.toFixed(2))}; },
  setRim(s){ if(rimUniforms) rimUniforms.uRimStrength.value=s; },
  windCompare(x,z,y=2900){ const a=windBaseAt(x,z,simTime,new THREE.Vector3()), b=windSteeredAt(x,z,y,simTime,new THREE.Vector3()); return {base:{mag:+Math.hypot(a.x,a.z).toFixed(1),ang:+(Math.atan2(a.x,-a.z)*DEG).toFixed(0)}, steered:{mag:+Math.hypot(b.x,b.z).toFixed(1)}}; },
  findThermal(){ for(let R=1700;R<16000;R+=1700)for(let a=0;a<16;a++){ const x=Math.round(Math.cos(a/16*6.28)*R/1700)*1700, z=Math.round(Math.sin(a/16*6.28)*R/1700)*1700, s=thermalStrength(x,z), g=terrainHeight(x,z); if(s>0.5&&g<2000) return {x,z,s:+s.toFixed(2),g:Math.round(g)}; } return null; },
  brakeNow(){ return +brake.toFixed(3); },
  hud(){ return { speedMS:+(glider.airspeed*MPS).toFixed(1), altM:+(glider.pos.y*MPS+ALT_BASE).toFixed(1), varioMS:+(glider.vel.y*MPS).toFixed(2) }; },
  _touch(){ return { active:touch.active, h:+touch.h.toFixed(2), v:+touch.v.toFixed(2), tL, tR }; },
  audioNodes(){ return { rumble:!!rumbleGain, howl:!!howlGain, buff:!!buffLFOGain, ctx:audioCtx?audioCtx.state:'none' }; },
  enclosure(){ return +canyonEnclosure().toFixed(2); },
  mapPeak(){ return +heatPeak.toFixed(2); },
  music(){ return { idx:musicIdx, on:musicOn, vol:+music.volume.toFixed(2), title:TRACKS[musicIdx].t, artist:TRACKS[musicIdx].a, n:TRACKS.length, ct:+(music.currentTime||0).toFixed(1), paused:music.paused, dur:Math.round(music.duration||0) }; },
  musicNext(){ musicSkip(1); }, musicPrev(){ musicSkip(-1); },
  gfxState(){ return { q:gfxQ, pr:+renderer.getPixelRatio().toFixed(2), shadows:renderer.shadowMap.enabled }; },
  setGfx(q){ setGfx(q); },
  thermState(){ return { scale:+thermalScale.toFixed(2), thresh:+thermThresh.toFixed(3), gain:+thermGain.toFixed(1) }; },
  setTherm(s){ setThermals(s); },
  renderInfo(){ const r=renderer.info.render; return { calls:r.calls, triangles:r.triangles }; },
  spoilerDeg(){ return +(flex.spoilerR.rotation.x*DEG).toFixed(1); },
  nearMissNow(){ return +nearMiss.toFixed(3); },
  clearance(){ return +clearanceNow().toFixed(0); },
  crashState(){ return {on:crashOn, state}; }, setCrash(v){ crashOn=v; },
  trailOpacity(){ return +trailR.mat.uniforms.uOpacity.value.toFixed(3); }, setTrails(v){ trailsOn=v; },
  trailTipDist(){ const c=trailR.cpos,n=c.length; return +Math.hypot(c[n-3]-glider.pos.x,c[n-2]-glider.pos.y,c[n-3+2]-glider.pos.z).toFixed(2); },
  varioState(){ return varioOn; }, brakeFxOpacity(){ return +brkMat.opacity.toFixed(3); },
  orbit(az,el){ camOrbitAz=az; camOrbitEl=el; camIdle=0; }, camAz(){ return +camOrbitAz.toFixed(3); },
  dragState(){ return {dragging, camIdle:+camIdle.toFixed(2), az:+camOrbitAz.toFixed(2), el:+camOrbitEl.toFixed(2)}; },
  camRel(){ const c=camera.position, g=gliderGroup.position;
    const f=new THREE.Vector3(0,0,-1).applyQuaternion(gliderGroup.quaternion), rt=new THREE.Vector3(1,0,0).applyQuaternion(gliderGroup.quaternion);
    const d=new THREE.Vector3().subVectors(c,g);
    return {dist:+d.length().toFixed(1), behind:+(-d.dot(f)).toFixed(1), side:+d.dot(rt).toFixed(1), up:+d.y.toFixed(1), az:+camOrbitAz.toFixed(2), el:+camOrbitEl.toFixed(2)}; },
  audioState(){ return audioOn; },
  sunView(y=7000){ previewMode=true; gliderGroup.position.set(0,-99999,0); camera.position.set(0,y,0); camera.lookAt(new THREE.Vector3(0,y,0).add(SUN_DIR.clone().multiplyScalar(1000))); },
  camUpWorldY(){ return +(new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion).y).toFixed(3); },
  camDist(){ return +camera.position.distanceTo(gliderGroup.position).toFixed(1); },
  sim(n,h=0,v=0,yaw=0,brk=0){
    inputOverride={h,v,yaw,brake:brk}; let minA=999,maxA=-999;
    for(let i=0;i<n;i++){ fixedStep(); const f=new THREE.Vector3(0,0,-1).applyQuaternion(glider.q);
      const a=Math.acos(clamp(f.y,-1,1))*DEG; minA=Math.min(minA,a);maxA=Math.max(maxA,a); }
    inputOverride=null;
    const f=new THREE.Vector3(0,0,-1).applyQuaternion(glider.q), u=new THREE.Vector3(0,1,0).applyQuaternion(glider.q);
    return { air:+glider.airspeed.toFixed(1), gnd:+glider.gndspeed.toFixed(1), alphaDeg:+(glider.alpha*DEG).toFixed(1),
             betaDeg:+(lastBeta*DEG).toFixed(1), fwdY:+f.y.toFixed(3), upY:+u.y.toFixed(3), stall:+glider.stall.toFixed(2),
             pitchRange:[+minA.toFixed(1),+maxA.toFixed(1)], heading:+Math.atan2(f.x,-f.z).toFixed(3),
             y:+glider.pos.y.toFixed(0), agl:+(glider.pos.y-terrainHeight(glider.pos.x,glider.pos.z)).toFixed(0),
             vY:+glider.vel.y.toFixed(1), gload:+glider.gload.toFixed(2), brake:+brake.toFixed(2) };
  }
};

} catch(err){
  const el=document.getElementById('loaderr'); el.style.display='flex';
  el.innerHTML='<div><b>Не удалось запустить.</b><br>'+(err&&err.message?err.message:err)+'<br><br>Нужен WebGL и интернет (Three.js с CDN).</div>'; console.error(err);
}
</script>
