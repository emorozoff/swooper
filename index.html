<script type="module">
import * as THREE from 'three';
window.__swooper = {};
try {
const VERSION = '0.43';

/* =====================================================================
   OWN FLIGHT PHYSICS — real glider aerodynamics (no scripted limits).
   gravity + lift QA·V²·Cl(α)⟂airflow + drag QA·V²·Cd(α)∥-airflow.
   Speed cap = terminal velocity. Stall = Cl collapse past critical AoA.
   Loops/rolls = control torque vs aerodynamic weathervane stability.
   v0.20: wind 35 + gusts; pitch +50% sharper; LONG TAIL (×2 yaw
   inertia/damping -> nose drops slower in knife-edge); mountains +
   endless descent; glider-shaped craft; stripped dev menu.
   ===================================================================== */
const FIXED = 0.02;
const MASS = 1.0, G = 20.0;
// QA = ½·ρ·A lumped (force = QA·V²·C). Raised 0.0014->0.0034 = a bigger / more
// efficient wing (lower wing loading) -> min loop radius ∝ m/(QA·Cl_max) drops
// -> tight, completable loops. Side effect: more drag -> ~20% slower flight.
const QA = 0.0034;

// lift curve Cl(α)
const CL_SLOPE = 6.5, CL_FP = 0.70;
// higher critical AoA = more stall margin so a hard pull stays attached (max-G)
// -> loops complete instead of mushing. stall now a low-speed phenomenon.
const ALPHA_STALL = 0.36, ALPHA_BLEND = 0.045, ALPHA_TRIM = 0.045;
// drag curve Cd(α). Energy rework (v0.26): low parasitic CD0 -> high top speed
// (dives really accelerate) + floaty efficient glide; low induced CD_IND
// (high-aspect wing) -> pulling/looping/turning keeps speed. Loops still tight.
const CD0 = 0.045, CD_IND = 0.022, CD_STALL = 1.20;
// lateral
const CY_BETA = 2.0;

// rotational inertia (body axes). roll easy, pitch/yaw heavier.
// NOTE: the "long tail" yaw-inertia experiment (×2) was headless A/B-tested
// vs v0.10 and did NOT slow the knife-edge nose-drop — because in knife-edge
// α≈β≈0 (the craft already tracks its velocity vector); the nose drops only
// because the velocity itself curves down (gravity, no lift). A bigger tail
// tracks the path even tighter -> can't help. Reverted to honest values.
const I_ROLL = 0.80, I_PITCH = 2.00, I_YAW = 2.40;
// control power. STRONG, snappy pitch; PITCH_STAB tuned so a full pull settles
// just below the (now higher) stall AoA -> max-G, clean, loop-capable.
const ROLL_POWER = 7.5;               // gentler roll rate
// asymmetric pitch: nose-up (pull) gentle; nose-down (push) also eased a bit.
const PITCH_POWER_UP = 7.0, PITCH_POWER_DOWN = 9.0;
const YAW_CTRL = 4.0;                 // rudder authority (Q/E) — eased 1.5×
// aerodynamic stability (weathervane).
const PITCH_STAB = 36.0, YAW_STAB = 20.0;
const STALL_PITCH = 5.0;             // nose-down pitching moment once stalled
// aerodynamic + base angular damping
const ROLL_DAMP = 2.7, PITCH_DAMP = 8.0, YAW_DAMP = 3.4;
const ROLL_DAMP0 = 0.35, PITCH_DAMP0 = 0.50, YAW_DAMP0 = 0.45;
// control authority reference (dynamic pressure where controls saturate)
const REF_V = 130, QD_REF = QA*REF_V*REF_V, Q_CAP = 2.2;
const MAXW = 7.0, INIT_SPEED = 150, AXIS_RATE = 6.0;

const SPD_LO = 90, SPD_HI = 250;     // camera/HUD speed normalization

// wind: steady breeze toward +X, plus strong buffeting gusts + sharp squalls
const WIND = new THREE.Vector3(35, 0, 0);
const GUST_AMP = 9.0, SQUALL_AMP = 18.0, GUST_ROLL = 0.5;

const clamp=(v,a,b)=> v<a?a:v>b?b:v;
const invLerp=(a,b,v)=> (v-a)/(b-a);
const WORLD_UP=new THREE.Vector3(0,1,0), WORLD_DOWN=new THREE.Vector3(0,-1,0), ZERO=new THREE.Vector3();
const DEG=180/Math.PI;

/* ===================== RENDERER / SCENE ===================== */
const app=document.getElementById('app');
const renderer=new THREE.WebGLRenderer({antialias:true, powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight); app.appendChild(renderer.domElement);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const SKY=new THREE.Color(0xcfe0e8), HORIZON=new THREE.Color(0xeae6d6);
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(HORIZON,0.000055);
const camera=new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.5, 60000);
scene.add(new THREE.HemisphereLight(0xeaf1ff,0x6e7060,0.42));   // lower ambient -> darker, more visible shadows
// sun = shadow-casting directional light, follows the craft so shadows are always near you
const SUN_OFFSET=new THREE.Vector3(-2600,4200,-1700), SUN_DIR=SUN_OFFSET.clone().normalize();
const sun=new THREE.DirectionalLight(0xfff2db,1.55); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.bias=-0.0004; sun.shadow.normalBias=10;
{ const c=sun.shadow.camera; c.near=200; c.far=14000; c.left=-4200; c.right=4200; c.top=4200; c.bottom=-4200; c.updateProjectionMatrix(); }
scene.add(sun); scene.add(sun.target);
const sunDisc=new THREE.Mesh(new THREE.SphereGeometry(1400,18,18), new THREE.MeshBasicMaterial({color:0xfff6e2,fog:false})); sunDisc.renderOrder=-1; scene.add(sunDisc);
const skyMat=new THREE.ShaderMaterial({ side:THREE.BackSide, fog:false, depthWrite:false, depthTest:false,
  uniforms:{ top:{value:SKY}, bottom:{value:HORIZON} },
  vertexShader:`varying vec3 d; void main(){ d=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.); }`,
  fragmentShader:`uniform vec3 top,bottom; varying vec3 d; void main(){ float h=clamp(normalize(d).y*.5+.5,0.,1.); gl_FragColor=vec4(mix(bottom,top,smoothstep(0.,1.,h)),1.); }`});
const sky=new THREE.Mesh(new THREE.SphereGeometry(48000,24,16),skyMat); sky.renderOrder=-1; scene.add(sky);
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ===================== TERRAIN — low-poly mountains, endless descent ===================== */
/* terrainHeight(x,z) = global downslope (so flying forward = downhill, you
   can glide forever) + ridged fbm mountains. Streamed in a GRID of chunks
   recentred on the craft (toroidal index map), rebuilt only on boundary cross. */
// Himalaya-like ridged mountains: tall sharp ridges & deep valleys, infinite
// extent. No floor (glider passes through). You SOAR on the wind field below:
// orographic ridge lift on windward faces + thermal columns. Watch the vario.
const PEAK_H=6200, TFF_BASE=0.000085, T_OCT=5, RIDGE_SHARP=2.1, T_WARP=950;
const CHUNK=3000, GRID=7, HALF=(GRID-1)/2, SEG=32;
function hash2(ix,iz){ let h=Math.imul(ix|0,374761393)^Math.imul(iz|0,668265263); h=Math.imul(h^(h>>>13),1274126177); return ((h^(h>>>16))>>>0)/4294967296; }
function vnoise(x,z){ const x0=Math.floor(x),z0=Math.floor(z),fx=x-x0,fz=z-z0;
  const sx=fx*fx*(3-2*fx),sz=fz*fz*(3-2*fz);
  const a=hash2(x0,z0),b=hash2(x0+1,z0),c=hash2(x0,z0+1),d=hash2(x0+1,z0+1);
  return a+(b-a)*sx+(c-a)*sz+(a-b-c+d)*sx*sz; }
function ridgedFbm(x,z){ let amp=1,freq=1,sum=0,norm=0;
  for(let o=0;o<T_OCT;o++){ let n=vnoise(x*freq,z*freq); n=1-Math.abs(2*n-1); n=Math.pow(n,RIDGE_SHARP); sum+=n*amp*(0.45+0.55*n); norm+=amp; amp*=0.5; freq*=2.0; }
  return sum/norm; }
function terrainHeight(x,z){
  const wx=x+T_WARP*Math.sin(z*0.00006+1.7), wz=z+T_WARP*Math.sin(x*0.00005+0.4);   // domain warp
  return ridgedFbm(wx*TFF_BASE+5.0, wz*TFF_BASE+2.0)*PEAK_H - 1100;
}
// ---- wind field: orographic ridge lift + thermals -> you can SOAR ----
// NON-UNIFORM wind: a slow large-scale drift of direction & strength over km,
// from low-freq noise around the mean WIND -> different breeze in each valley.
const WIND_VAR_FF=0.000045, WIND_DIR_SWING=1.5, WIND_SPD_MIN=20, WIND_SPD_MAX=52;
const _WBANG=Math.atan2(WIND.x,-WIND.z);
function windBaseAt(x,z,t,out){
  const a=vnoise(x*WIND_VAR_FF+10.0, z*WIND_VAR_FF+4.0);
  const b=vnoise(x*WIND_VAR_FF*1.6-3.0, z*WIND_VAR_FF*1.6+8.0);
  const h=_WBANG + (a-0.5)*WIND_DIR_SWING + 0.12*Math.sin(t*0.045);
  const spd=WIND_SPD_MIN + (WIND_SPD_MAX-WIND_SPD_MIN)*b;
  return out.set(Math.sin(h)*spd, 0, -Math.cos(h)*spd);
}
// thermals: static source strength 0..1 (smoothstep core -> wider & catchable)
// + gentle time wobble. Drives lift, GROUND TINT and CLOUD placement alike.
const RIDGE_GAIN=0.6, RIDGE_H=2400, THERMAL_GAIN=52, THERMAL_H=8000, THFF=0.0003, THERMAL_THRESH=0.30;
function thermalStrength(x,z){ const n=vnoise(x*THFF+3.1,z*THFF+1.7); const c=clamp((n-THERMAL_THRESH)/(1-THERMAL_THRESH),0,1); return c*c*(3-2*c); }
function thermalAt(x,z,t){ return thermalStrength(x,z)*(0.80+0.20*Math.sin(t*0.2 + x*0.0013 + z*0.0011)); }
const _wbLift=new THREE.Vector3();
function windLift(x,y,z,t){
  const ag=Math.max(0, y-terrainHeight(x,z)), d=45;
  const gx=(terrainHeight(x+d,z)-terrainHeight(x-d,z))/(2*d), gz=(terrainHeight(x,z+d)-terrainHeight(x,z-d))/(2*d);
  windBaseAt(x,z,t,_wbLift);
  const oro=RIDGE_GAIN*(_wbLift.x*gx+_wbLift.z*gz)*Math.exp(-ag/RIDGE_H);  // wind into a windward face -> updraft (lee -> sink)
  const th =THERMAL_GAIN*thermalAt(x,z,t)*Math.exp(-ag/THERMAL_H);         // rising thermal columns
  return clamp(oro+th, -26, 28);   // gentle enough to add lift, not spike AoA into a stall
}

const C_GREEN=[0.30,0.45,0.22], C_ROCK=[0.46,0.42,0.35], C_SNOW=[0.95,0.96,0.99];
function setColor(col,o,h,ny,wx,wz){
  const snow=clamp((h-3100)/1400,0,1), green=clamp((1100-h)/1300,0,1), steep=clamp((0.80-ny)/0.42,0,1);
  let r=C_ROCK[0],g=C_ROCK[1],b=C_ROCK[2];                       // rock base
  const gf=green*(1-steep);  r+=(C_GREEN[0]-r)*gf; g+=(C_GREEN[1]-g)*gf; b+=(C_GREEN[2]-b)*gf;   // green low/gentle
  const sf=snow*(1-steep*0.55); r+=(C_SNOW[0]-r)*sf; g+=(C_SNOW[1]-g)*sf; b+=(C_SNOW[2]-b)*sf;   // snow high
  // THERMAL TINT: sun-baked dark/warm patches mark the strong rising columns
  // (those that grow a cumulus above) -> look down = dark patch, look up = cloud.
  const th=thermalStrength(wx,wz);
  if(th>0.22){ const k=clamp((th-0.22)*1.25,0,0.6)*(1-snow*0.9);
    r+=(0.17-r)*k; g+=(0.105-g)*k; b+=(0.055-b)*k; }
  col[o]=r; col[o+1]=g; col[o+2]=b;
}
const terrainMat=new THREE.MeshLambertMaterial({vertexColors:true, flatShading:true});
// worldspace grid overlay -> the ground is easy to read (proximity / speed / relief)
const GRID_SIZE=120;
terrainMat.onBeforeCompile=(sh)=>{
  sh.vertexShader='varying vec3 vWP;\n'+sh.vertexShader.replace(
    '#include <begin_vertex>', '#include <begin_vertex>\n vWP=(modelMatrix*vec4(transformed,1.0)).xyz;');
  sh.fragmentShader='varying vec3 vWP;\n'+sh.fragmentShader.replace('#include <dithering_fragment>',
    'vec2 gc=vWP.xz/'+GRID_SIZE.toFixed(1)+';\n'+
    'vec2 gd=abs(fract(gc-0.5)-0.5)/fwidth(gc);\n'+
    'float ln=1.0-min(min(gd.x,gd.y),1.0);\n'+
    'gl_FragColor.rgb=mix(gl_FragColor.rgb, gl_FragColor.rgb*0.45, ln*0.6);\n'+
    '#include <dithering_fragment>');
};
const chunks=[];
{
  const N=SEG+1, idx=[];
  for(let z=0;z<SEG;z++)for(let x=0;x<SEG;x++){ const a=z*N+x,b=a+1,c=a+N,d=c+1; idx.push(a,c,b, b,c,d); }
  for(let i=0;i<GRID*GRID;i++){
    const geo=new THREE.BufferGeometry();
    const verts=new Float32Array(N*N*3), cols=new Float32Array(N*N*3);
    for(let z=0;z<N;z++)for(let x=0;x<N;x++){ const o=(z*N+x)*3; verts[o]=(x/SEG-0.5)*CHUNK; verts[o+1]=0; verts[o+2]=(z/SEG-0.5)*CHUNK; }
    geo.setAttribute('position',new THREE.BufferAttribute(verts,3));
    geo.setAttribute('color',new THREE.BufferAttribute(cols,3));
    geo.setIndex(idx);
    const mesh=new THREE.Mesh(geo,terrainMat); mesh.frustumCulled=false; mesh.castShadow=true; mesh.receiveShadow=true;
    scene.add(mesh); chunks.push({mesh,cx:null,cz:null});
  }
}
function buildChunk(ch,cx,cz){
  const N=SEG+1, pos=ch.mesh.geometry.attributes.position.array, col=ch.mesh.geometry.attributes.color.array;
  const ox=cx*CHUNK, oz=cz*CHUNK;
  for(let i=0;i<N*N;i++){ const o=i*3; pos[o+1]=terrainHeight(ox+pos[o], oz+pos[o+2]); }
  ch.mesh.position.set(ox,0,oz);
  ch.mesh.geometry.attributes.position.needsUpdate=true;
  ch.mesh.geometry.computeVertexNormals();
  const nrm=ch.mesh.geometry.attributes.normal.array;
  for(let i=0;i<N*N;i++){ const o=i*3; setColor(col,o, pos[o+1], nrm[o+1], ox+pos[o], oz+pos[o+2]); }
  ch.mesh.geometry.attributes.color.needsUpdate=true;
  ch.cx=cx; ch.cz=cz;
}
function updateTerrain(){
  const ccx=Math.round(glider.pos.x/CHUNK), ccz=Math.round(glider.pos.z/CHUNK);
  for(let dz=-HALF;dz<=HALF;dz++)for(let dx=-HALF;dx<=HALF;dx++){
    const cx=ccx+dx, cz=ccz+dz;
    const ix=((cx%GRID)+GRID)%GRID, iz=((cz%GRID)+GRID)%GRID;
    const ch=chunks[ix*GRID+iz];
    if(ch.cx!==cx||ch.cz!==cz) buildChunk(ch,cx,cz);
  }
}

/* ===================== WIND PARTICLES (parcels of air) ===================== */
const AIR_N=1400, AIR_BOX=1700;
const airPos=new Float32Array(AIR_N*3);
let airParticles;
{
  const rng=mulberry32(99);
  for(let i=0;i<AIR_N;i++){ airPos[i*3]=(rng()-0.5)*AIR_BOX; airPos[i*3+1]=(rng()-0.5)*AIR_BOX; airPos[i*3+2]=(rng()-0.5)*AIR_BOX; }
  const geo=new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(airPos,3));
  const mat=new THREE.PointsMaterial({ color:0xcfe2ee, size:3.0, sizeAttenuation:true, transparent:true, opacity:0.34, depthWrite:false, fog:false });
  airParticles=new THREE.Points(geo,mat); airParticles.frustumCulled=false; scene.add(airParticles);
}
const _wbPart=new THREE.Vector3();
function updateAirParticles(dt){
  const c=glider.pos; windBaseAt(c.x,c.z,simTime,_wbPart);
  const wx=_wbPart.x*dt, wz=_wbPart.z*dt;
  for(let i=0;i<AIR_N;i++){
    const o=i*3;
    let x=airPos[o]+wx, y=airPos[o+1]+thermalAt(airPos[o],airPos[o+2],simTime)*28*dt, z=airPos[o+2]+wz;
    let rx=x-c.x; rx-=AIR_BOX*Math.round(rx/AIR_BOX); x=c.x+rx;
    let ry=y-c.y; ry-=AIR_BOX*Math.round(ry/AIR_BOX); y=c.y+ry;
    let rz=z-c.z; rz-=AIR_BOX*Math.round(rz/AIR_BOX); z=c.z+rz;
    airPos[o]=x; airPos[o+1]=y; airPos[o+2]=z;
  }
  airParticles.geometry.attributes.position.needsUpdate=true;
}

/* ===================== CLOUDS (cumulus over thermals + sparse ambiance) =====================
   Instanced camera-facing billboards. Cumulus cluster on the TOP of every strong
   thermal column -> a landmark you aim for to find lift (like real soaring). A few
   sparse fair-weather puffs elsewhere for depth. Streamed in a cell grid round the craft. */
const CLOUD_CELL=1700, CLOUD_R=6, CLOUD_PUFFS=5, CLOUD_BASE=3900, CLOUD_THRESH=0.42;
const CLOUD_N=(2*CLOUD_R+1)*(2*CLOUD_R+1)*CLOUD_PUFFS;
let cloudCX=null, cloudCZ=null;
const cloudCenter=new THREE.InstancedBufferAttribute(new Float32Array(CLOUD_N*3),3);
const cloudSize  =new THREE.InstancedBufferAttribute(new Float32Array(CLOUD_N),1);
const cloudBright=new THREE.InstancedBufferAttribute(new Float32Array(CLOUD_N),1);
{
  const cv=document.createElement('canvas'); cv.width=cv.height=64; const g2=cv.getContext('2d');
  const grd=g2.createRadialGradient(32,32,1,32,32,31);
  grd.addColorStop(0,'rgba(255,255,255,1)'); grd.addColorStop(0.45,'rgba(255,255,255,0.72)'); grd.addColorStop(1,'rgba(255,255,255,0)');
  g2.fillStyle=grd; g2.fillRect(0,0,64,64);
  const tex=new THREE.CanvasTexture(cv);
  const quad=new THREE.PlaneGeometry(1,1);
  const cgeo=new THREE.InstancedBufferGeometry();
  cgeo.setIndex(quad.index); cgeo.setAttribute('position',quad.attributes.position); cgeo.setAttribute('uv',quad.attributes.uv);

function updateClouds(){
  const ccx=Math.round(glider.pos.x/CLOUD_CELL), ccz=Math.round(glider.pos.z/CLOUD_CELL);
  if(ccx===cloudCX&&ccz===cloudCZ) return;
  cloudCX=ccx; cloudCZ=ccz;
  const C=cloudCenter.array, S=cloudSize.array, B=cloudBright.array;
  let p=0;
  for(let dz=-CLOUD_R;dz<=CLOUD_R;dz++)for(let dx=-CLOUD_R;dx<=CLOUD_R;dx++){
    const cx=ccx+dx, cz=ccz+dz, wx=cx*CLOUD_CELL, wz=cz*CLOUD_CELL;
    const s=thermalStrength(wx,wz);
    const ambient = s<=CLOUD_THRESH && hash2(cx*7+1, cz*13+5)>0.70;     // sparse fair-weather puffs
    const base=Math.max(CLOUD_BASE, terrainHeight(wx,wz)+500);
    for(let k=0;k<CLOUD_PUFFS;k++){
      const o=p*3;
      if(s>CLOUD_THRESH){                                               // cumulus marking a thermal
        const h1=hash2(cx*131+k*17, cz*977+k*7), h2=hash2(cx*53+k*3, cz*191+k*29), h3=hash2(cx*311+k, cz*97+k*13);

        C[o]=wx+(h1-0.5)*700; C[o+1]=base+520+(h2-0.5)*240; C[o+2]=wz+(h2-0.5)*700;
        S[p]=300+220*h1; B[p]=0.82;

}

/* ===================== CRAFT: Classic sailplane + selectable FLEX modes (keys 1-5) =====================

     1 rigid · 2 simple root-bow · 3 advanced multi-segment cantilever wing · 4 fuselage(boom) whip · 5 combined.
   Built ONCE with 3 nested wing segments per side + a hinged tail boom; modes differ only in how
   updateFlex() drives those joints. Mesh is cosmetic — physics is a point mass, flex never affects flight. */
const FLEX_MODES=['Жёсткое','Простое (корень)','Продвинутое (сегментное крыло)','Гибкий корпус (хвост-балка)','Комбо (крыло+корпус)'];

function buildFlexGlider(){

        cWing=new THREE.MeshLambertMaterial({color:p.wing,flatShading:true}),
        cAcc =new THREE.MeshLambertMaterial({color:p.acc, flatShading:true}),
        cGlass=new THREE.MeshLambertMaterial({color:p.glass,flatShading:true});

  const pod =new THREE.Mesh(new THREE.CylinderGeometry(0.58,0.5,3.6,12),cBody); pod.rotation.x=Math.PI/2; pod.position.z=-0.7; g.add(pod);
  const can =new THREE.Mesh(new THREE.SphereGeometry(0.46,12,9),cGlass); can.scale.set(1,0.82,2.6); can.position.set(0,0.4,-1.7); g.add(can);

const FX={ K:13, ZUP:0.5, ZDN:1.0, BEND_G:0.05, BEND_MIN:-0.07, BEND_MAX:0.18, SEGW:[0.35,0.55,0.80],
           ASYM_G:0.05, FLUT_AMP:0.012, FLUT_W:13, WASH:0.45,
           BOOM_K:9, BOOM_Z:0.5, DROOP_G:0.05, DROOP_MIN:-0.05, DROOP_MAX:0.10, YAW_G:0.06, BOOM_FLUT:0.008 };
const FLEX_SIDES=[['segL',-1],['segR',1]];
function setFlexMode(i){
  flexMode=((i%FLEX_MODES.length)+FLEX_MODES.length)%FLEX_MODES.length;
  flex.bend=flex.bendV=flex.asym=flex.droop=flex.droopV=flex.yaw=flex.yawV=0;   // reset springs -> ease from rest

function updateFlex(dt){
  if(!flex.ready) return;
  dt=Math.min(dt,0.05); const m=flexMode, N=4, sdt=dt/N;
  const exG=clamp(glider.gload-1,-1.5,4), roll=glider.pRoll||0, yaw=glider.rYaw||0, pitch=glider.qPitch||0;
  const wingMode = (m===0||m===3)?'rigid' : (m===1)?'simple' : 'adv';   // m3 body-only -> rigid wings
  // ---- wing-bend spring (substepped semi-implicit -> stable even at dt spikes) ----
  const wantBend = wingMode==='rigid' ? 0 : clamp(exG*FX.BEND_G,FX.BEND_MIN,FX.BEND_MAX);
  const zeta = wantBend<flex.bend?FX.ZDN:FX.ZUP;
  for(let s=0;s<N;s++){ const a=FX.K*FX.K*(wantBend-flex.bend)-2*zeta*FX.K*flex.bendV; flex.bendV+=a*sdt; flex.bend+=flex.bendV*sdt; }
  flex.bend=clamp(flex.bend,FX.BEND_MIN-0.03,FX.BEND_MAX+0.06);
  const adv = wingMode==='adv';
  const wantAsym = adv?clamp(roll*FX.ASYM_G,-0.06,0.06):0; flex.asym+=(wantAsym-flex.asym)*(1-Math.exp(-dt*8));
  const flut = adv?FX.FLUT_AMP*(0.4+clamp(exG,0,3)*0.3)*Math.sin(simTime*FX.FLUT_W):0;
  const wash = adv?-FX.WASH*Math.max(0,flex.bend):0;
  for(const [key,sgn] of FLEX_SIDES){
    const segs=flex[key];
    if(wingMode==='rigid'){ segs[0].rotation.z=sgn*flex.dih; segs[1].rotation.z=0; segs[2].rotation.z=0; segs[2].rotation.x=0; }
    else if(wingMode==='simple'){ segs[0].rotation.z=sgn*(flex.dih+flex.bend); segs[1].rotation.z=0; segs[2].rotation.z=0; segs[2].rotation.x=0; }
    else { const B=flex.bend+sgn*flex.asym, f=(sgn>0?flut:-flut);
      segs[0].rotation.z=sgn*(flex.dih+B*FX.SEGW[0]);
      segs[1].rotation.z=sgn*(B*FX.SEGW[1])+f;
      segs[2].rotation.z=sgn*(B*FX.SEGW[2])+f*1.6;
      segs[2].rotation.x=wash; }

  flex.droop=clamp(flex.droop,FX.DROOP_MIN-0.03,FX.DROOP_MAX+0.05);
  const wantYaw = boomOn?clamp(-yaw*FX.YAW_G+lastBeta*0.06,-0.12,0.12):0;
  for(let s=0;s<N;s++){ const a=FX.BOOM_K*FX.BOOM_K*(wantYaw-flex.yaw)-2*FX.BOOM_Z*FX.BOOM_K*flex.yawV; flex.yawV+=a*sdt; flex.yaw+=flex.yawV*sdt; }

let rawH=0, rawV=0, rawY=0, horizontalInput=0, verticalInput=0, yawInput=0;
let inputOverride=null;             // headless

function startFlight(){
  initAudio();

  spawnY=glider.pos.y;                                  // ALT readout = climb/descent from start
  const m=new THREE.Matrix4().lookAt(ZERO, new THREE.Vector3(0,-0.10,-1).normalize(), WORLD_UP);
  glider.q.setFromRotationMatrix(m);
  const f0=new THREE.Vector3(0,0,-1).applyQuaternion(glider.q);
  glider.vel.copy(f0).multiplyScalar(INIT_SPEED);
  glider.angVel.set(0,0,0);
  glider.airspeed=INIT_SPEED; glider.gndspeed=INIT_SPEED; glider.alpha=0; glider.stall=0;
  rawH=rawV=horizontalInput=verticalInput=0;
  prevPos.copy(glider.pos); prevQ.copy(glider.q);

  previewMode=false;

}

function resumeFlight(){   // un-pause: keep flying from where we left off (no teleport/reset)
  if(state!=='paused') return;
  initAudio();
  last=performance.now(); acc=0;   // avoid one huge catch-up step after the pause
  state='flying'; pauseEl.classList.add('hidden');
}

function readInput(){
  let tH, tV, tY;
  if (inputOverride){ tH=inputOverride.h; tV=inputOverride.v; tY=inputOverride.yaw||0; }
  else {
    tH=((keys.KeyA||keys.ArrowLeft)?1:0)-((keys.KeyD||keys.ArrowRight)?1:0); // left = roll/turn left
    tV=((keys.ArrowDown||keys.KeyS)?1:0)-((keys.ArrowUp||keys.KeyW)?1:0);    // down = nose up (default)
    tY=((keys.KeyE)?1:0)-((keys.KeyQ)?1:0);                                  // E = yaw right, Q = yaw left
  }
  const step=AXIS_RATE*FIXED;
  rawH += clamp(tH-rawH,-step,step); rawV += clamp(tV-rawV,-step,step); rawY += clamp(tY-rawY,-step,step);
  horizontalInput = rawH * sens;
  verticalInput   = rawV * sens * (invert?-1:1);

}

/* ===================== PHYSICS (own aerodynamics) ===================== */
const _f=new THREE.Vector3(), _r=new THREE.Vector3(), _u=new THREE.Vector3(),
      _vair=new THREE.Vector3(), _ahat=new THREE.Vector3(), _lift=new THREE.Vector3(), _side=new THREE.Vector3(),
      _wind=new THREE.Vector3(), _F=new THREE.Vector3(), _T=new THREE.Vector3(), _dq=new THREE.Quaternion(), _axis=new THREE.Vector3(),
      _wbStep=new THREE.Vector3();
let lastBeta=0;

function fixedStep(){
  readInput();
  simTime+=FIXED;
  const hIn=clamp(horizontalInput,-1,1), vIn=clamp(verticalInput,-1,1), yIn=clamp(yawInput,-1,1);

  _f.set(0,0,-1).applyQuaternion(glider.q);
  _r.set(1,0,0).applyQuaternion(glider.q);
  _u.set(0,1,0).applyQuaternion(glider.q);

  // wind + strong gusts + sharp squalls (feeds aero -> craft really rocks/sways)
  const t=simTime;
  const sq=SQUALL_AMP*Math.pow(Math.max(0,Math.sin(t*0.32+0.5)),6);   // sharp gust front, peaks ~every 20s
  const sqA=t*0.23;
  windBaseAt(glider.pos.x, glider.pos.z, t, _wbStep);                 // local drifting breeze (varies over km)
  _wind.set(
    _wbStep.x + GUST_AMP*(Math.sin(t*0.37)+0.6*Math.sin(t*0.91+1.3)) + sq*Math.cos(sqA),
                GUST_AMP*0.5*(Math.sin(t*0.61+0.8)+0.5*Math.sin(t*1.23+2.1)) + sq*0.45*Math.sin(t*0.8),
    _wbStep.z + GUST_AMP*(Math.sin(t*0.43+2.1)+0.6*Math.sin(t*1.07+0.5)) + sq*Math.sin(sqA)
  );
  _wind.y += windLift(glider.pos.x, glider.pos.y, glider.pos.z, t);   // ridge lift + thermals (soaring)
  _vair.copy(glider.vel).sub(_wind);
  const V=_vair.length();
  glider.airspeed=V; glider.gndspeed=glider.vel.length();

  _F.set(0,0,0);
  _F.y -= MASS*G;                                       // gravity

  let alpha=0, beta=0, w=0;
  if (V>1e-3){
    _ahat.copy(_vair).multiplyScalar(1/V);
    const vf=_vair.dot(_f), vu=_vair.dot(_u), vr=_vair.dot(_r);
    alpha=Math.atan2(-vu, vf);                          // angle of attack
    beta =Math.atan2( vr, vf);                          // sideslip
    const aa=Math.abs(alpha);
    const clAtt=CL_SLOPE*alpha, clFp=CL_FP*Math.sin(2*alpha);
    w=1/(1+Math.exp(-(aa-ALPHA_STALL)/ALPHA_BLEND));    // 0 attached -> 1 stalled
    const cl=(1-w)*clAtt + w*clFp;
    const cd=CD0 + CD_IND*cl*cl + w*CD_STALL*Math.sin(aa)*Math.sin(aa);
    const qd=QA*V*V;
    glider.gload=(qd*cl)/(MASS*G);                       // wing load factor (drives flex)

    _lift.copy(_u).addScaledVector(_ahat, -_u.dot(_ahat));
    if (_lift.lengthSq()>1e-9){ _lift.normalize(); _F.addScaledVector(_lift, qd*cl); }
    _F.addScaledVector(_ahat, -qd*cd);
    _side.copy(_r).addScaledVector(_ahat, -_r.dot(_ahat));
    if (_side.lengthSq()>1e-9){ _side.normalize(); _F.addScaledVector(_side, qd*(-CY_BETA*beta)); }

    // ----- torques (body axes) -----
    const qs=clamp(qd/QD_REF,0,Q_CAP);
    const pRoll=glider.angVel.dot(_f), qPitch=glider.angVel.dot(_r), rYaw=glider.angVel.dot(_u);
    glider.pRoll=pRoll; glider.qPitch=qPitch; glider.rYaw=rYaw;     // body-frame rates -> flex driver
    let tRoll  = -ROLL_POWER*hIn*qs;
    let tPitch =  (vIn>0?PITCH_POWER_UP:PITCH_POWER_DOWN)*vIn*qs;   // gentler pull, fuller push
    let tYaw   = -YAW_CTRL*yIn*qs;                                  // E = yaw right (heading +)
    tPitch += -PITCH_STAB*(alpha-ALPHA_TRIM)*qs;
    tPitch += -STALL_PITCH*w;
    tYaw   += -YAW_STAB*beta*qs;
    tRoll  += -(ROLL_DAMP*qs +ROLL_DAMP0 )*pRoll;
    tPitch += -(PITCH_DAMP*qs+PITCH_DAMP0)*qPitch;
    tYaw   += -(YAW_DAMP*qs  +YAW_DAMP0  )*rYaw;
    // gusts hit the wings unevenly -> visible rolling/pitching buffeting (strong in squalls)
    tRoll  += (GUST_ROLL*(Math.sin(t*1.7+0.3)+0.7*Math.sin(t*0.83+2.0)) + sq*0.018*Math.sin(t*1.1+0.6))*qs;
    tPitch += (0.35*GUST_ROLL*Math.sin(t*1.3+1.1) + sq*0.012*Math.sin(t*0.9))*qs;

    _T.set(0,0,0);
    _T.addScaledVector(_f, tRoll/I_ROLL);
    _T.addScaledVector(_r, tPitch/I_PITCH);
    _T.addScaledVector(_u, tYaw/I_YAW);
    glider.angVel.addScaledVector(_T, FIXED);
  }
  glider.alpha=alpha; glider.stall=w; lastBeta=beta;

  // ----- integrate -----
  glider.vel.addScaledVector(_F, FIXED/MASS);
  glider.pos.addScaledVector(glider.vel, FIXED);
  let wl=glider.angVel.length();
  if (wl>MAXW){ glider.angVel.multiplyScalar(MAXW/wl); wl=MAXW; }
  if (wl>1e-6){ _dq.setFromAxisAngle(_axis.copy(glider.angVel).multiplyScalar(1/wl), wl*FIXED); glider.q.premultiply(_dq); glider.q.normalize(); }

  // terrain collision disabled for now — glider passes through (impacts return later)
}

/* ===================== CAMERA (chase, never inverts) ===================== */
const _camGoal=new THREE.Vector3(), _look=new THREE.Vector3(), _cUp=new THREE.Vector3(), _cu2=new THREE.Vector3(),
      _cf=new THREE.Vector3(), _lr=new THREE.Vector3(), _lu=new THREE.Vector3(), _cp=new THREE.Vector3(), _ml=new THREE.Matrix4(), _cq=new THREE.Quaternion(), _ctmp=new THREE.Vector3();
const LOOK_AHEAD=42, ROLL_TILT=0.20;     // camera tilts ≤~14° with bank, fades to 0 inverted (smooth thru rolls)
let camDistSmooth=60;                     // speed-based camera distance, eased over time
function updateCamera(dt, rpos, rq){
  _cf.set(0,0,-1).applyQuaternion(rq);
  _cu2.set(0,1,0).applyQuaternion(rq);
  // level (no-roll) up in the plane of forward
  _lr.crossVectors(_cf, WORLD_UP);
  if (_lr.lengthSq()<1e-4){ _lr.set(1,0,0).applyQuaternion(rq); _lr.y=0; if(_lr.lengthSq()<1e-6)_lr.set(1,0,0); }
  _lr.normalize(); _lu.crossVectors(_lr,_cf).normalize();
  // craft-up projected ⟂ forward (rotates continuously with roll, no atan2 wrap)
  _cp.copy(_cu2).addScaledVector(_cf, -_cu2.dot(_cf));
  if (_cp.lengthSq()<1e-6) _cp.copy(_lu); else _cp.normalize();
  // limited tilt toward roll that FADES TO ZERO at inversion -> no jerk in barrel rolls
  _cUp.copy(_cp).sub(_lu).multiplyScalar(ROLL_TILT).add(_lu).normalize();
  // speed -> camera distance (100->60, 300->100), eased
  const targetDist=clamp(30+(glider.gndspeed-100)*0.07, 36, 44);   // closer (min 36 so slow flight isn't too tight)
  camDistSmooth += (targetDist-camDistSmooth)*(1-Math.exp(-dt*1.5));
  _camGoal.copy(rpos).addScaledVector(_cf,-camDistSmooth*0.95).addScaledVector(WORLD_UP,camDistSmooth*0.30);
  camera.position.lerp(_camGoal, 1-Math.exp(-dt*1.6));         // smooth chase
  _ctmp.copy(camera.position).sub(rpos); const cd=_ctmp.length();   // leash to eased distance (kills lag blowout)
  if (cd>camDistSmooth) camera.position.copy(rpos).addScaledVector(_ctmp, camDistSmooth/cd);
  const tY=terrainHeight(camera.position.x,camera.position.z)+22;
  if (camera.position.y<tY) camera.position.y=tY;
  _look.copy(rpos).addScaledVector(_cf,LOOK_AHEAD);
  _ml.lookAt(camera.position,_look,_cUp); _cq.setFromRotationMatrix(_ml);
  camera.quaternion.slerp(_cq, 1-Math.exp(-dt*2.2));           // smooth aim
  const sn=clamp(invLerp(SPD_LO,SPD_HI,glider.gndspeed),0,1);
  const fov=70+sn*16; camera.fov+=(fov-camera.fov)*Math.min(1,dt*4); camera.updateProjectionMatrix();
  document.getElementById('vign').style.opacity=Math.max(0,(sn-0.5))*0.8;
}

/* ===================== HUD — glass-cockpit instruments ===================== */
const NS='http://www.w3.org/2000/svg';
function E(t,a,p){ const e=document.createElementNS(NS,t); for(const k in a)e.setAttribute(k,a[k]); if(p)p.appendChild(e); return e; }
const C_AMBER='#e8b04b', C_INK='#0c1014', C_CREAM='#eae4d6', C_BG='rgba(12,16,20,0.30)', AH_SIGN=1;

const MONO='ui-monospace,SFMono-Regular,Menlo,monospace';

const hsvg=E('svg',{viewBox:`0 0 ${HW} 58`,width:HW,height:58,class:'inst'},document.getElementById('i-hdg'));
E('rect',{x:0,y:18,width:HW,height:24,rx:4,fill:C_BG},hsvg);
const hcl=E('clipPath',{id:'hcl'},hsvg); hcl.appendChild(E('rect',{x:6,y:18,width:HW-12,height:24}));
const hG=E('g',{'clip-path':'url(#hcl)'},hsvg);
const hT=[]; for(let i=0;i<74;i++){ const ln=E('line',{stroke:C_CREAM,'stroke-width':1.2},hG); const tx=E('text',{fill:C_CREAM,'font-size':11,'text-anchor':'middle','font-family':MONO},hG); hT.push({ln,tx}); }
E('polygon',{points:`${HW/2-6},16 ${HW/2+6},16 ${HW/2},24`,fill:C_AMBER},hsvg);
E('rect',{x:HW/2-23,y:43,width:46,height:14,rx:3,fill:C_INK,stroke:C_AMBER,'stroke-width':1},hsvg);

function updHdg(hdg){
  for(let i=0;i<hT.length;i++){
    const d=Math.floor((hdg-90)/5)*5+i*5, x=HW/2+(d-hdg)*HPX, t=hT[i];
    if(x<8||x>HW-8){ t.ln.setAttribute('opacity',0); t.tx.setAttribute('opacity',0); continue; }
    const maj=(((d%30)+30)%30)===0;
    t.ln.setAttribute('x1',x); t.ln.setAttribute('x2',x); t.ln.setAttribute('y1',20); t.ln.setAttribute('y2',maj?32:27); t.ln.setAttribute('opacity',0.85);
    if(maj){ const dd=((d%360)+360)%360; t.tx.textContent=dd===0?'N':dd===90?'E':dd===180?'S':dd===270?'W':''+dd; t.tx.setAttribute('x',x); t.tx.setAttribute('y',41); t.tx.setAttribute('opacity',0.95); } else t.tx.setAttribute('opacity',0);
  }
  hVal.textContent=(''+Math.round(((hdg%360)+360)%360)).padStart(3,'0');
}

// ---- vertical tape (airspeed / altitude) ----
function vtape(elId,o){
  const W=o.W,H=300,cy=H/2;
  const svg=E('svg',{viewBox:`0 0 ${W} ${H}`,width:W,height:H,class:'inst'},document.getElementById(elId));
  E('rect',{x:0,y:16,width:W,height:H-32,rx:4,fill:C_BG},svg);
  const cl=E('clipPath',{id:elId+'cl'},svg); cl.appendChild(E('rect',{x:0,y:16,width:W,height:H-32}));
  const g=E('g',{'clip-path':`url(#${elId}cl)`},svg);
  const ticks=[]; for(let i=0;i<34;i++){ const ln=E('line',{stroke:C_CREAM,'stroke-width':1.1},g); const tx=E('text',{fill:C_CREAM,'font-size':10.5,'text-anchor':'end','font-family':MONO},g); const bd=o.bands?E('rect',{x:W-4,width:4},g):null; ticks.push({ln,tx,bd}); }
  E('polygon',{points:`3,${cy} 13,${cy-9} ${W-2},${cy-9} ${W-2},${cy+9} 13,${cy+9}`,fill:C_INK,stroke:C_AMBER,'stroke-width':1.3},svg);
  const val=E('text',{x:W-5,y:cy+4,'text-anchor':'end','font-size':14,fill:'#fff','font-weight':600,'font-family':MONO},svg);
  E('text',{x:W/2,y:12,'text-anchor':'middle','font-size':9.5,fill:C_CREAM,opacity:0.85,'font-family':MONO},svg).textContent=o.unit;
  return {o,cy,H,W,ticks,val,numX:W-9,tx1:W-22,tx2:W-12};
}
function updVtape(T,value){
  const o=T.o, cy=T.cy, st=o.step, px=o.px;
  for(let i=0;i<T.ticks.length;i++){
    const v=Math.floor((value-o.span)/st)*st+i*st, y=cy-(v-value)*px, t=T.ticks[i];
    if(y<18||y>T.H-18){ t.ln.setAttribute('opacity',0); t.tx.setAttribute('opacity',0); if(t.bd)t.bd.setAttribute('opacity',0); continue; }
    const maj=(((v%o.lab)+o.lab)%o.lab)===0;
    t.ln.setAttribute('x1',maj?T.tx1:T.tx1+6); t.ln.setAttribute('x2',T.tx2); t.ln.setAttribute('y1',y); t.ln.setAttribute('y2',y); t.ln.setAttribute('opacity',0.8);
    if(maj){ t.tx.textContent=v; t.tx.setAttribute('x',T.numX); t.tx.setAttribute('y',y+3.5); t.tx.setAttribute('opacity',0.92); } else t.tx.setAttribute('opacity',0);
    if(t.bd){ const c=v>265?'#d9534f':v>190?'#e0b552':'#5aa35a'; t.bd.setAttribute('y',y-px*st/2); t.bd.setAttribute('height',px*st+1); t.bd.setAttribute('fill',c); t.bd.setAttribute('opacity',0.92); }
  }
  T.val.textContent=Math.round(value);
}
const asi=vtape('i-asi',{W:74,step:10,px:1.7,span:90,lab:20,unit:'km/h',bands:true});
const alti=vtape('i-alt',{W:80,step:50,px:0.16,span:950,lab:200,unit:'m'});

// ---- variometer (scale + moving needle, fixed digital readout at the bottom) ----

const vsvg=E('svg',{viewBox:`0 0 ${VW} ${VH}`,width:VW,height:VH,class:'inst'},document.getElementById('i-vario'));
E('rect',{x:8,y:16,width:VW-16,height:VSB-16,rx:4,fill:C_BG},vsvg);
E('text',{x:VW/2,y:12,'text-anchor':'middle','font-size':9.5,fill:C_CREAM,opacity:0.85,'font-family':MONO},vsvg).textContent='VARIO';
for(let v=-6;v<=6;v+=2){ const y=VCY-v*VPX; E('line',{x1:VW-26,y1:y,x2:VW-16,y2:y,stroke:C_CREAM,'stroke-width':1.1,opacity:0.8},vsvg); E('text',{x:VW-29,y:y+3,'text-anchor':'end','font-size':9,fill:C_CREAM,opacity:0.8,'font-family':MONO},vsvg).textContent=(v>0?'+':'')+v; }
E('line',{x1:VW-26,y1:VCY,x2:VW-12,y2:VCY,stroke:C_CREAM,'stroke-width':1.6,opacity:0.9},vsvg);
const vNeedle=E('polygon',{points:`${VW-16},${VCY} ${VW-7},${VCY-5} ${VW-7},${VCY+5}`,fill:C_AMBER},vsvg);
E('rect',{x:8,y:VH-38,width:VW-16,height:20,rx:3,fill:C_INK,stroke:C_AMBER,'stroke-width':1},vsvg);
const vVal=E('text',{x:VW/2,y:VH-23,'text-anchor':'middle','font-size':13,fill:C_AMBER,'font-weight':600,'font-family':MONO},vsvg);
E('text',{x:VW/2,y:VH-5,'text-anchor':'middle','font-size':8.5,fill:C_CREAM,opacity:0.7,'font-family':MONO},vsvg).textContent='m/s';
function updVario(ms){ const c=Math.max(-6,Math.min(6,ms)), y=VCY-c*VPX; vNeedle.setAttribute('points',`${VW-16},${y} ${VW-7},${y-5} ${VW-7},${y+5}`); vVal.textContent=(ms>=0?'+':'')+ms.toFixed(1); }

// ---- wind indicator: nose-up compass rose, amber arrow shows where the wind blows TO ----
const WSZ=84, WC=WSZ/2, WCY=WC+2, WR=29;
const wsvg=E('svg',{viewBox:`0 0 ${WSZ} ${WSZ+30}`,width:WSZ,height:WSZ+30,class:'inst'},document.getElementById('i-wind'));

E('polygon',{points:`${WC},${WCY-WR-3} ${WC-3.5},${WCY-WR+4} ${WC+3.5},${WCY-WR+4}`,fill:C_CREAM,opacity:0.85},wsvg);   // fixed nose reference

E('line',{x1:WC,y1:WCY+WR-7,x2:WC,y2:WCY-WR+10,stroke:C_AMBER,'stroke-width':2.2,'stroke-linecap':'round'},wArrow);
E('polygon',{points:`${WC},${WCY-WR+3} ${WC-5},${WCY-WR+13} ${WC+5},${WCY-WR+13}`,fill:C_AMBER},wArrow);
E('circle',{cx:WC,cy:WCY,r:2.4,fill:C_INK,stroke:C_AMBER,'stroke-width':1},wsvg);   // hub
E('rect',{x:WC-23,y:WSZ+9,width:46,height:17,rx:3,fill:C_INK,stroke:C_AMBER,'stroke-width':1},wsvg);

wVal.textContent=Math.round(WIND.length());                  // initial (mean) before flight
const _wbHud=new THREE.Vector3();
function updWind(hdg){                                        // live LOCAL wind (direction + strength)
  windBaseAt(glider.pos.x, glider.pos.z, simTime, _wbHud);
  const wAng=Math.atan2(_wbHud.x,-_wbHud.z)*DEG, mag=Math.hypot(_wbHud.x,_wbHud.z);
  wArrow.setAttribute('transform',`rotate(${(wAng-hdg).toFixed(1)} ${WC} ${WCY})`);
  wVal.textContent=Math.round(mag);

function updateHUD(dt){
  const air=glider.airspeed, alt=glider.pos.y-spawnY, hdg=Math.atan2(_f.x,-_f.z)*DEG, vario=glider.vel.y*0.1;
  updHdg(hdg); updVtape(asi,air); updVtape(alti,alt); updVario(vario); updWind(hdg);
  stallW.classList.toggle('on', glider.stall>0.4);
  updateAudio(); updateVarioSound(vario, dt||FIXED);
}

/* ===================== AUDIO (procedural wind + variometer beep) ===================== */
let audioCtx=null, windGain=null, windFilt=null, audioOn=true;
let varioOsc=null, varioGain=null, beepPhase=0;
function initAudio(){
  try{
    if(audioCtx){ audioCtx.resume&&audioCtx.resume(); return; }
    audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    const sr=audioCtx.sampleRate, buf=audioCtx.createBuffer(1, sr*2, sr), d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    const src=audioCtx.createBufferSource(); src.buffer=buf; src.loop=true;
    windFilt=audioCtx.createBiquadFilter(); windFilt.type='lowpass'; windFilt.frequency.value=500; windFilt.Q.value=0.7;
    windGain=audioCtx.createGain(); windGain.gain.value=0;
    src.connect(windFilt); windFilt.connect(windGain); windGain.connect(audioCtx.destination); src.start();
    // variometer tone: rising beeps when climbing, low growl in strong sink
    varioOsc=audioCtx.createOscillator(); varioOsc.type='sine'; varioOsc.frequency.value=600;
    varioGain=audioCtx.createGain(); varioGain.gain.value=0;
    varioOsc.connect(varioGain); varioGain.connect(audioCtx.destination); varioOsc.start();
  }catch(e){}
}
function updateAudio(){
  if(!audioCtx||audioCtx.state!=='running'||!windGain) return;
  const sp=glider.airspeed, agl=glider.pos.y-terrainHeight(glider.pos.x,glider.pos.z);
  const sn=clamp((sp-50)/240,0,1), prox=clamp(1-agl/700,0,1), now=audioCtx.currentTime;
  windGain.gain.setTargetAtTime(audioOn?(0.03+0.17*sn*sn+0.07*prox):0, now, 0.12);
  windFilt.frequency.setTargetAtTime(320+sp*4.2+prox*700, now, 0.12);
}
function updateVarioSound(vario, dt){   // vario in m/s (vel.y*0.1)
  if(!audioCtx||audioCtx.state!=='running'||!varioGain) return;
  const now=audioCtx.currentTime;
  if(!audioOn){ varioGain.gain.setTargetAtTime(0, now, 0.05); return; }
  if(vario>0.15){                       // climbing -> beeps; faster & higher with stronger lift
    const c=Math.min(vario,4);
    varioOsc.frequency.setTargetAtTime(620+c*180, now, 0.02);
    beepPhase += dt*(1.5+c*1.7);  if(beepPhase>=1) beepPhase-=1;
    varioGain.gain.setTargetAtTime(beepPhase<0.5?0.05:0.0, now, 0.008);
  } else if(vario<-1.4){                 // strong sink -> quiet low growl
    varioOsc.frequency.setTargetAtTime(225, now, 0.06);
    varioGain.gain.setTargetAtTime(0.022, now, 0.06); beepPhase=0;
  } else { varioGain.gain.setTargetAtTime(0, now, 0.05); beepPhase=0; }
}
function silenceAudio(){    // on pause: fade everything out so nothing hangs while frozen
  if(!audioCtx||!windGain) return; const now=audioCtx.currentTime;
  windGain.gain.setTargetAtTime(0,now,0.05); if(varioGain) varioGain.gain.setTargetAtTime(0,now,0.05);
}

/* ===================== LOOP ===================== */
let last=performance.now(), acc=0;
const _rp=new THREE.Vector3(), _rq=new THREE.Quaternion();
function loop(now){
  requestAnimationFrame(loop);
  let frame=(now-last)/1000; last=now; if(!(frame>0))frame=0; frame=Math.min(frame,0.1);
  if (state==='flying'){
    acc+=frame; let guard=0;
    while(acc>=FIXED && guard++<8){ prevPos.copy(glider.pos); prevQ.copy(glider.q); fixedStep(); acc-=FIXED; }
    updateHUD(frame); updateTerrain(); updateClouds();
  }
  const alpha = state==='flying' ? clamp(acc/FIXED,0,1) : 1;
  _rp.lerpVectors(prevPos, glider.pos, alpha);
  _rq.copy(prevQ).slerp(glider.q, alpha);
  if(!previewMode){ gliderGroup.position.copy(_rp); gliderGroup.quaternion.copy(_rq);
    updateCamera(frame||FIXED, _rp, _rq); }
  updateFlex(frame||FIXED);
  sky.position.copy(camera.position);
  sun.position.copy(_rp).add(SUN_OFFSET); sun.target.position.copy(_rp); sun.target.updateMatrixWorld();
  sunDisc.position.copy(camera.position).addScaledVector(SUN_DIR,44000);
  updateAirParticles(frame||FIXED);
  renderer.render(scene,camera);
}
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

// menu backdrop
glider.pos.set(0, Math.max(terrainHeight(0,0)+1300, 2700), 0);
{ const m=new THREE.Matrix4().lookAt(ZERO,new THREE.Vector3(0,-0.10,-1).normalize(),WORLD_UP); glider.q.setFromRotationMatrix(m); }
prevPos.copy(glider.pos); prevQ.copy(glider.q);
_f.set(0,0,-1).applyQuaternion(glider.q);
updateTerrain(); updateClouds();
camera.position.set(0, glider.pos.y+10, 36); camera.lookAt(0, glider.pos.y-6, -40);
requestAnimationFrame(loop);

/* ===================== headless hooks ===================== */
window.__swooper={
  get state(){return state;}, get speed(){return glider.gndspeed;}, get airspeed(){return glider.airspeed;},
  pos(){ return {x:+glider.pos.x.toFixed(1),y:+glider.pos.y.toFixed(1),z:+glider.pos.z.toFixed(1)}; },
  start(){ startFlight(); },
  th(x,z){ return +terrainHeight(x,z).toFixed(0); },
  liftAt(x,y,z){ return +windLift(x,y,z,simTime).toFixed(1); },
  craftLift(){ return +windLift(glider.pos.x,glider.pos.y,glider.pos.z,simTime).toFixed(1); },
  tstr(x,z){ return +thermalStrength(x,z).toFixed(3); },
  windBase(x,z){ const v=windBaseAt(x,z,simTime,new THREE.Vector3()); return {x:+v.x.toFixed(1),z:+v.z.toFixed(1),mag:+Math.hypot(v.x,v.z).toFixed(1),ang:+(Math.atan2(v.x,-v.z)*DEG).toFixed(0)}; },
  cloudCount(){ let n=0; for(let i=0;i<cloudSize.array.length;i++) if(cloudSize.array[i]>0) n++; return n; },
  setFlex(i){ setFlexMode(i); }, flexCount(){ return FLEX_MODES.length; },
  flexState(){ return {mode:flexMode, name:FLEX_MODES[flexMode], bend:+flex.bend.toFixed(4), asym:+flex.asym.toFixed(4), droop:+flex.droop.toFixed(4), yaw:+flex.yaw.toFixed(4),
    segR:flex.segR.map(s=>+s.rotation.z.toFixed(3)), segL:flex.segL.map(s=>+s.rotation.z.toFixed(3)), boomX:+flex.boomRear.rotation.x.toFixed(3), boomY:+flex.boomRear.rotation.y.toFixed(3)}; },
  preview(i,dist=16,az=0.7,el=0.34,g=null,pitch=null){ if(i!=null) setFlexMode(i); if(g!=null) glider.gload=g; if(pitch!=null) glider.qPitch=pitch; previewMode=true; gliderGroup.position.set(0,0,0); gliderGroup.quaternion.identity();
    camera.position.set(Math.sin(az)*Math.cos(el)*dist, Math.sin(el)*dist, Math.cos(az)*Math.cos(el)*dist); camera.lookAt(0,0.4,0); },
  varioGainNow(){ return varioGain?+varioGain.gain.value.toFixed(4):-1; },
  camUpWorldY(){ return +(new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion).y).toFixed(3); },
  camDist(){ return +camera.position.distanceTo(gliderGroup.position).toFixed(1); },
  sim(n,h=0,v=0,yaw=0){
    inputOverride={h,v,yaw}; let minA=999,maxA=-999;
    for(let i=0;i<n;i++){ fixedStep(); const f=new THREE.Vector3(0,0,-1).applyQuaternion(glider.q);
      const a=Math.acos(clamp(f.y,-1,1))*DEG; minA=Math.min(minA,a);maxA=Math.max(maxA,a); }
    inputOverride=null;
    const f=new THREE.Vector3(0,0,-1).applyQuaternion(glider.q), u=new THREE.Vector3(0,1,0).applyQuaternion(glider.q);
    return { air:+glider.airspeed.toFixed(1), gnd:+glider.gndspeed.toFixed(1), alphaDeg:+(glider.alpha*DEG).toFixed(1),
             betaDeg:+(lastBeta*DEG).toFixed(1), fwdY:+f.y.toFixed(3), upY:+u.y.toFixed(3), stall:+glider.stall.toFixed(2),
             pitchRange:[+minA.toFixed(1),+maxA.toFixed(1)], heading:+Math.atan2(f.x,-f.z).toFixed(3),
             y:+glider.pos.y.toFixed(0), agl:+(glider.pos.y-terrainHeight(glider.pos.x,glider.pos.z)).toFixed(0),
             vY:+glider.vel.y.toFixed(1), gload:+glider.gload.toFixed(2) };
  }
};

} catch(err){
  const el=document.getElementById('loaderr'); el.style.display='flex';
  el.innerHTML='<div><b>Не удалось запустить.</b><br>'+(err&&err.message?err.message:err)+'<br><br>Нужен WebGL и интернет (Three.js с CDN).</div>'; console.error(err);
}
